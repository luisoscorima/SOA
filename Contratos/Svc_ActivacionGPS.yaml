openapi: 3.0.0

info:
  title: Svc_ActivacionGPS - API de TMS
  description: |
    Servicio encargado de activar el seguimiento GPS de un vehículo dentro del TMS, permitiendo iniciar el monitoreo de su ubicación durante el proceso de transporte.

    ---

    **Información Técnica del Servicio:**

    * **Protocolo:** REST / HTTPS / JSON

    * **Puerto del protocolo:** 8081 (Entorno Local)

    * **Tipo de servicio:** Utilidad

    * **Justificación SOA:** Stateless, ya que no mantiene estado interno y procesa cada solicitud de activación de forma independiente.

    ---
  version: 1.0.0

servers:
  - url: http://localhost:8081/api/tms
    description: Servidor Local de Desarrollo (Puerto 8081)

paths:
  /gps/activaciones:
    post:
      tags:
        - TMS
      operationId: registrarActivacionGPS
      summary: Activar seguimiento GPS
      description: Crea o ejecuta una nueva operación del módulo ActivacionGPS.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivacionGPSRequest'
            example:
              id_vehiculo: "VEH-000321"
              placa_vehiculo: "ABC-123"
              id_ruta: "RUTA-000789"
      responses:
        '201':
          description: Registro creado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivacionGPSResponseExito'
              example:
                ok: true
                seguimiento_activo: true
                id_seguimiento: "GPS-000456"
                mensaje: "Seguimiento GPS activado correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivacionGPSResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "El identificador del vehículo o la placa no cumplen con el formato requerido."
        '409':
          description: Conflicto o duplicado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivacionGPSResponseError409'
              example:
                ok: false
                error: "CONFLICTO"
                detalle: "El registro ya existe o presenta un conflicto operativo."

  /gps/activaciones/{id_activacion}:
    get:
      tags:
        - TMS
      operationId: consultarActivacionGPS
      summary: Consultar registro
      description: Consulta el resultado de una operación previamente registrada.
      parameters:
        - name: id_activacion
          in: path
          required: true
          description: Identificador del registro a consultar.
          schema:
            type: string
            maxLength: 50
            example: "ACT-000321"
      responses:
        '200':
          description: Consulta realizada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivacionGPSResponseConsultaExito'
              example:
                ok: true
                id_activacion: "ACT-000321"
                estado: "registrado"
                mensaje: "Consulta realizada correctamente"
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivacionGPSResponseError404'
              example:
                ok: false
                error: "VEHICULO_NO_ENCONTRADO"
                detalle: "No se encontró un vehículo registrado con los datos enviados."

    put:
      tags:
        - TMS
      operationId: actualizarActivacionGPS
      summary: Actualizar registro
      description: "Actualiza o corrige el estado de un registro existente. Para anular, envíe estado anulado."
      parameters:
        - name: id_activacion
          in: path
          required: true
          description: Identificador del registro a actualizar.
          schema:
            type: string
            maxLength: 50
            example: "ACT-000321"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivacionGPSRequestActualizar'
      responses:
        '200':
          description: Registro actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivacionGPSResponseActualizarExito'
              example:
                ok: true
                id_activacion: "ACT-000321"
                estado: "actualizado"
                mensaje: "Registro actualizado correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivacionGPSResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "El identificador del vehículo o la placa no cumplen con el formato requerido."
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivacionGPSResponseError404'
              example:
                ok: false
                error: "VEHICULO_NO_ENCONTRADO"
                detalle: "No se encontró un vehículo registrado con los datos enviados."

components:
  schemas:
    ActivacionGPSRequest:
      type: object
      required:
        - id_vehiculo
        - placa_vehiculo
      properties:
        id_vehiculo:
          type: string
          maxLength: 50
          description: "Código único del vehículo que será monitoreado por GPS."
          example: "VEH-000321"
        placa_vehiculo:
          type: string
          maxLength: 10
          description: "Placa del vehículo asociado al seguimiento."
          example: "ABC-123"
        id_ruta:
          type: string
          maxLength: 50
          description: "Código de la ruta asociada al vehículo. Opcional."
          example: "RUTA-000789"

    ActivacionGPSRequestActualizar:
      type: object
      required:
        - estado
      properties:
        estado:
          type: string
          maxLength: 30
          description: "Nuevo estado del registro. Use \"anulado\" para cancelar sin eliminar."
          example: "actualizado"
        observacion:
          type: string
          maxLength: 250
          description: "Comentario asociado a la actualización."
          example: "Actualización registrada correctamente."

    ActivacionGPSResponseExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        seguimiento_activo:
          type: boolean
          example: true
        id_seguimiento:
          type: string
          maxLength: 50
          example: "GPS-000456"
        mensaje:
          type: string
          example: "Seguimiento GPS activado correctamente"

    ActivacionGPSResponseConsultaExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_activacion:
          type: string
          maxLength: 50
          example: "ACT-000321"
        estado:
          type: string
          maxLength: 30
          example: "registrado"
        mensaje:
          type: string
          example: "Consulta realizada correctamente"

    ActivacionGPSResponseActualizarExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_activacion:
          type: string
          maxLength: 50
          example: "ACT-000321"
        estado:
          type: string
          maxLength: 30
          example: "actualizado"
        mensaje:
          type: string
          example: "Registro actualizado correctamente"

    ActivacionGPSResponseError400:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "DATOS_INVALIDOS"
        detalle:
          type: string
          maxLength: 250
          example: "El identificador del vehículo o la placa no cumplen con el formato requerido."

    ActivacionGPSResponseError404:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "VEHICULO_NO_ENCONTRADO"
        detalle:
          type: string
          maxLength: 250
          example: "No se encontró un vehículo registrado con los datos enviados."

    ActivacionGPSResponseError409:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "CONFLICTO"
        detalle:
          type: string
          maxLength: 250
          example: "El registro ya existe o presenta un conflicto operativo."
