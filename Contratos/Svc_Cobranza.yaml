openapi: 3.0.0

info:
  title: Svc_Cobranza - API de Financiero
  description: |
    Servicio encargado de registrar y procesar la cobranza asociada a un pedido, centralizando el proceso financiero de validación y confirmación de pago.

    ---

    **Información Técnica del Servicio:**

    * **Protocolo:** REST / HTTPS / JSON

    * **Puerto del protocolo:** 8081 (Entorno Local)

    * **Tipo de servicio:** Tarea

    * **Justificación SOA:** Encapsulación, ya que centraliza el proceso financiero de cobranza asociado al pedido.

    ---
  version: 1.0.0

servers:
  - url: http://localhost:8081/api/financiero
    description: Servidor Local de Desarrollo (Puerto 8081)

paths:
  /cobranzas:
    post:
      tags:
        - Financiero
      operationId: registrarCobranza
      summary: Procesar cobranza
      description: Crea o ejecuta una nueva operación del módulo Cobranza.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CobranzaRequest'
            example:
              id_pedido: "PED-000125"
              id_cliente: 150
              monto_total: 1250.50
              moneda: "PEN"
              metodo_pago: "transferencia"
      responses:
        '201':
          description: Registro creado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CobranzaResponseExito'
              example:
                ok: true
                id_pago: "PAGO-000321"
                estado_pago: "confirmado"
                mensaje: "Cobranza procesada correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CobranzaResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "El monto, moneda o método de pago enviado es inválido."
        '409':
          description: Conflicto o duplicado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CobranzaResponseError409'
              example:
                ok: false
                error: "PAGO_YA_REGISTRADO"
                detalle: "El pedido enviado ya cuenta con un pago registrado previamente."

  /cobranzas/{id_cobranza}:
    get:
      tags:
        - Financiero
      operationId: consultarCobranza
      summary: Consultar registro
      description: Consulta el resultado de una operación previamente registrada.
      parameters:
        - name: id_cobranza
          in: path
          required: true
          description: Identificador del registro a consultar.
          schema:
            type: string
            maxLength: 50
            example: "COB-000321"
      responses:
        '200':
          description: Consulta realizada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CobranzaResponseConsultaExito'
              example:
                ok: true
                id_cobranza: "COB-000321"
                estado: "registrado"
                mensaje: "Consulta realizada correctamente"
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CobranzaResponseError404'
              example:
                ok: false
                error: "RECURSO_NO_ENCONTRADO"
                detalle: "No se encontró el registro solicitado."

    put:
      tags:
        - Financiero
      operationId: actualizarCobranza
      summary: Actualizar registro
      description: "Actualiza o corrige el estado de un registro existente. Para anular, envíe estado anulado."
      parameters:
        - name: id_cobranza
          in: path
          required: true
          description: Identificador del registro a actualizar.
          schema:
            type: string
            maxLength: 50
            example: "COB-000321"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CobranzaRequestActualizar'
      responses:
        '200':
          description: Registro actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CobranzaResponseActualizarExito'
              example:
                ok: true
                id_cobranza: "COB-000321"
                estado: "actualizado"
                mensaje: "Registro actualizado correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CobranzaResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "El monto, moneda o método de pago enviado es inválido."
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CobranzaResponseError404'
              example:
                ok: false
                error: "RECURSO_NO_ENCONTRADO"
                detalle: "No se encontró el registro solicitado."

security:
  - bearerAuth: []

components:
  schemas:
    CobranzaRequest:
      type: object
      required:
        - id_pedido
        - id_cliente
        - monto_total
        - moneda
        - metodo_pago
      properties:
        id_pedido:
          type: string
          maxLength: 50
          description: "Código único del pedido asociado a la cobranza."
          example: "PED-000125"
        id_cliente:
          type: integer
          description: "Identificador del cliente asociado al pedido."
          example: 150
        monto_total:
          type: number
          format: float
          minimum: 0
          description: "Monto total a cobrar por el pedido."
          example: 1250.50
        moneda:
          type: string
          maxLength: 10
          description: "Moneda en la que se realiza la cobranza."
          example: "PEN"
        metodo_pago:
          type: string
          maxLength: 30
          description: "Método de pago utilizado por el cliente."
          example: "transferencia"

    CobranzaRequestActualizar:
      type: object
      required:
        - estado
      properties:
        estado:
          type: string
          maxLength: 30
          description: "Nuevo estado del registro. Use \"anulado\" para cancelar sin eliminar."
          example: "actualizado"
        observacion:
          type: string
          maxLength: 250
          description: "Comentario asociado a la actualización."
          example: "Actualización registrada correctamente."

    CobranzaResponseExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_pago:
          type: string
          maxLength: 50
          example: "PAGO-000321"
        estado_pago:
          type: string
          maxLength: 30
          example: "confirmado"
        mensaje:
          type: string
          example: "Cobranza procesada correctamente"

    CobranzaResponseConsultaExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_cobranza:
          type: string
          maxLength: 50
          example: "COB-000321"
        estado:
          type: string
          maxLength: 30
          example: "registrado"
        mensaje:
          type: string
          example: "Consulta realizada correctamente"

    CobranzaResponseActualizarExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_cobranza:
          type: string
          maxLength: 50
          example: "COB-000321"
        estado:
          type: string
          maxLength: 30
          example: "actualizado"
        mensaje:
          type: string
          example: "Registro actualizado correctamente"

    CobranzaResponseError400:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "DATOS_INVALIDOS"
        detalle:
          type: string
          maxLength: 250
          example: "El monto, moneda o método de pago enviado es inválido."

    CobranzaResponseError404:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "RECURSO_NO_ENCONTRADO"
        detalle:
          type: string
          maxLength: 250
          example: "No se encontró el registro solicitado."

    CobranzaResponseError409:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "PAGO_YA_REGISTRADO"
        detalle:
          type: string
          maxLength: 250
          example: "El pedido enviado ya cuenta con un pago registrado previamente."
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

