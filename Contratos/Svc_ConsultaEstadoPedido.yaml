openapi: 3.0.0

info:
  title: Svc_ConsultaEstadoPedido - API de ERP
  description: |
    Servicio encargado de consultar el estado actual de un pedido dentro del ERP, permitiendo obtener información actualizada del proceso comercial y logístico.

    ---

    **Información Técnica del Servicio:**

    * **Protocolo:** REST / HTTPS / JSON

    * **Puerto del protocolo:** 8081 (Entorno Local)

    * **Tipo de servicio:** Utilidad

    * **Justificación SOA:** Stateless, ya que permite consultas concurrentes sin mantener sesión entre solicitudes.

    ---
  version: 1.0.0

servers:
  - url: http://localhost:8081/api/erp
    description: Servidor Local de Desarrollo (Puerto 8081)

paths:

  /pedidos/estado:
    get:
      tags:
        - ERP
      operationId: consultarEstadoPedidoDirecto
      summary: Consultar estado de pedido (consulta rápida)
      description: Consulta directa sin identificador de registro previo.
      parameters:
        - name: id_pedido
          in: query
          required: true
          schema:
            type: string
            example: "PED-000125"
      responses:
        '200':
          description: Consulta realizada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsultaEstadoPedidoResponseExito'
              example:
                ok: true
                id_pedido: "PED-000125"
                estado: "en_ruta"
                fecha_actualizacion: "2026-05-29T15:30:00-05:00"
                mensaje: "Estado del pedido consultado correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsultaEstadoPedidoResponseError400'
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsultaEstadoPedidoResponseError404'
  /pedidos/consultas:
    post:
      tags:
        - ERP
      operationId: registrarConsultaEstadoPedido
      summary: Registrar consulta de estado de pedido
      description: Crea o ejecuta una nueva operación del módulo ConsultaEstadoPedido.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConsultaEstadoPedidoRequest'
            example:
              id_pedido: "PED-000125"
      responses:
        '200':
          description: Operación ejecutada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsultaEstadoPedidoResponseExito'
              example:
                ok: true
                id_pedido: "PED-000125"
                estado: "en_ruta"
                fecha_actualizacion: "2026-05-29T15:30:00"
                mensaje: "Estado del pedido consultado correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsultaEstadoPedidoResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "El identificador del pedido no cumple con el formato requerido."
        '409':
          description: Conflicto o duplicado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsultaEstadoPedidoResponseError409'
              example:
                ok: false
                error: "CONFLICTO"
                detalle: "El registro ya existe o presenta un conflicto operativo."

  /pedidos/consultas/{id_consulta}:
    get:
      tags:
        - ERP
      operationId: consultarConsultaEstadoPedido
      summary: Consultar registro
      description: Consulta el resultado de una operación previamente registrada.
      parameters:
        - name: id_consulta
          in: path
          required: true
          description: Identificador del registro a consultar.
          schema:
            type: string
            maxLength: 50
            example: "CONS-000125"
      responses:
        '200':
          description: Consulta realizada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsultaEstadoPedidoResponseConsultaExito'
              example:
                ok: true
                id_consulta: "CONS-000125"
                estado: "registrado"
                mensaje: "Consulta realizada correctamente"
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsultaEstadoPedidoResponseError404'
              example:
                ok: false
                error: "PEDIDO_NO_ENCONTRADO"
                detalle: "No existe un pedido registrado con el identificador enviado."

    put:
      tags:
        - ERP
      operationId: actualizarConsultaEstadoPedido
      summary: Actualizar registro
      description: Actualiza o corrige el estado de un registro existente.
      parameters:
        - name: id_consulta
          in: path
          required: true
          description: Identificador del registro a actualizar.
          schema:
            type: string
            maxLength: 50
            example: "CONS-000125"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConsultaEstadoPedidoRequestActualizar'
      responses:
        '200':
          description: Registro actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsultaEstadoPedidoResponseActualizarExito'
              example:
                ok: true
                id_consulta: "CONS-000125"
                estado: "actualizado"
                mensaje: "Registro actualizado correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsultaEstadoPedidoResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "El identificador del pedido no cumple con el formato requerido."
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsultaEstadoPedidoResponseError404'
              example:
                ok: false
                error: "PEDIDO_NO_ENCONTRADO"
                detalle: "No existe un pedido registrado con el identificador enviado."

security:
  - bearerAuth: []

components:
  schemas:
    ConsultaEstadoPedidoRequest:
      type: object
      required:
        - id_pedido
      properties:
        id_pedido:
          type: string
          minLength: 3
          maxLength: 50
          description: "Código único del pedido registrado en el ERP."
          example: "PED-000125"

    ConsultaEstadoPedidoRequestActualizar:
      type: object
      required:
        - estado
      properties:
        estado:
          type: string
          maxLength: 30
          description: "Nuevo estado del registro."
          example: "actualizado"
        observacion:
          type: string
          maxLength: 250
          description: "Comentario asociado a la actualización."
          example: "Actualización registrada correctamente."

    ConsultaEstadoPedidoResponseExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true

        id_pedido:
          type: string
          maxLength: 50
          example: "PED-000125"

        estado:
          type: string
          maxLength: 50
          description: "Estado actual del pedido."
          example: "en_ruta"

        fecha_actualizacion:
          type: string
          format: date-time
          description: "Fecha y hora de la última actualización del pedido."
          example: "2026-05-29T15:30:00"

        mensaje:
          type: string
          example: "Estado del pedido consultado correctamente"

    ConsultaEstadoPedidoResponseConsultaExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_consulta:
          type: string
          maxLength: 50
          example: "CONS-000125"
        estado:
          type: string
          maxLength: 30
          example: "registrado"
        mensaje:
          type: string
          example: "Consulta realizada correctamente"

    ConsultaEstadoPedidoResponseActualizarExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_consulta:
          type: string
          maxLength: 50
          example: "CONS-000125"
        estado:
          type: string
          maxLength: 30
          example: "actualizado"
        mensaje:
          type: string
          example: "Registro actualizado correctamente"

    ConsultaEstadoPedidoResponseError400:
      type: object
      properties:
        ok:
          type: boolean
          example: false

        error:
          type: string
          maxLength: 100
          example: "DATOS_INVALIDOS"

        detalle:
          type: string
          maxLength: 250
          example: "El identificador del pedido no cumple con el formato requerido."

    ConsultaEstadoPedidoResponseError404:
      type: object
      properties:
        ok:
          type: boolean
          example: false

        error:
          type: string
          maxLength: 100
          example: "PEDIDO_NO_ENCONTRADO"

        detalle:
          type: string
          maxLength: 250
          example: "No existe un pedido registrado con el identificador enviado."

    ConsultaEstadoPedidoResponseError409:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "CONFLICTO"
        detalle:
          type: string
          maxLength: 250
          example: "El registro ya existe o presenta un conflicto operativo."
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

