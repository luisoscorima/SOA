openapi: 3.0.0

info:
  title: Svc_ControlCalidad - API de WMS
  description: |
    Servicio encargado de realizar el control de calidad de productos en el WMS, validando su estado antes de continuar con el proceso logístico correspondiente.

    ---

    **Información Técnica del Servicio:**

    * **Protocolo:** REST / HTTPS / JSON

    * **Puerto del protocolo:** 8081 (Entorno Local)

    * **Tipo de servicio:** Tarea

    * **Justificación SOA:** Reusabilidad, ya que puede aplicarse en múltiples procesos logísticos.

    ---
  version: 1.0.0

servers:
  - url: http://localhost:8081/api/wms
    description: Servidor Local de Desarrollo (Puerto 8081)

paths:
  /calidad/validaciones:
    post:
      tags:
        - WMS
      operationId: registrarControlCalidad
      summary: Ejecutar validación de calidad
      description: Crea o ejecuta una nueva operación del módulo ControlCalidad.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ControlCalidadRequest'
            example:
              id_proceso: "PROC-000125"
              tipo_proceso: "picking"
      responses:
        '200':
          description: Operación ejecutada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlCalidadResponseExito'
              example:
                ok: true
                id_control_calidad: "CC-000458"
                productos_validados: 1
                resultado: "aprobado"
                mensaje: "Productos validados correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlCalidadResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "La lista de productos no puede estar vacía."
        '409':
          description: Conflicto o duplicado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlCalidadResponseError409'
              example:
                ok: false
                error: "PRODUCTOS_YA_VALIDADOS"
                detalle: "Uno o más productos ya fueron validados previamente."

  /calidad/validaciones/{id_validacion}:
    get:
      tags:
        - WMS
      operationId: consultarControlCalidad
      summary: Consultar registro
      description: Consulta el resultado de una operación previamente registrada.
      parameters:
        - name: id_validacion
          in: path
          required: true
          description: Identificador del registro a consultar.
          schema:
            type: string
            maxLength: 50
            example: "CAL-000321"
      responses:
        '200':
          description: Consulta realizada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlCalidadResponseConsultaExito'
              example:
                ok: true
                id_validacion: "CAL-000321"
                estado: "registrado"
                mensaje: "Consulta realizada correctamente"
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlCalidadResponseError404'
              example:
                ok: false
                error: "RECURSO_NO_ENCONTRADO"
                detalle: "No se encontró el registro solicitado."

    put:
      tags:
        - WMS
      operationId: actualizarControlCalidad
      summary: Actualizar registro
      description: Actualiza o corrige el estado de un registro existente.
      parameters:
        - name: id_validacion
          in: path
          required: true
          description: Identificador del registro a actualizar.
          schema:
            type: string
            maxLength: 50
            example: "CAL-000321"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ControlCalidadRequestActualizar'
      responses:
        '200':
          description: Registro actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlCalidadResponseActualizarExito'
              example:
                ok: true
                id_validacion: "CAL-000321"
                estado: "actualizado"
                mensaje: "Registro actualizado correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlCalidadResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "La lista de productos no puede estar vacía."
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlCalidadResponseError404'
              example:
                ok: false
                error: "RECURSO_NO_ENCONTRADO"
                detalle: "No se encontró el registro solicitado."

components:
  schemas:
    ControlCalidadRequest:
      type: object
      required:
        - id_proceso
        - tipo_proceso
        - productos
      properties:
        id_proceso:
          type: string
          maxLength: 50
          description: "Código del proceso logístico asociado al control de calidad."
          example: "PROC-000125"
        tipo_proceso:
          type: string
          maxLength: 30
          description: "Tipo de proceso donde se aplica el control de calidad."
          example: "picking"
        productos:
          type: array
          description: "Listado de productos que serán validados."
          items:
            type: object
            properties:
              id_producto:
                type: string
                maxLength: 50
                example: "SKU_IK_1.5L"
              lote:
                type: string
                maxLength: 50
                example: "LOT-2026-001"
              cantidad:
                type: integer
                minimum: 1
                example: 120
              estado_calidad:
                type: string
                maxLength: 30
                example: "aprobado"

    ControlCalidadRequestActualizar:
      type: object
      required:
        - estado
      properties:
        estado:
          type: string
          maxLength: 30
          description: "Nuevo estado del registro."
          example: "actualizado"
        observacion:
          type: string
          maxLength: 250
          description: "Comentario asociado a la actualización."
          example: "Actualización registrada correctamente."

    ControlCalidadResponseExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_control_calidad:
          type: string
          maxLength: 50
          example: "CC-000458"
        productos_validados:
          type: integer
          example: 1
        resultado:
          type: string
          maxLength: 30
          example: "aprobado"
        mensaje:
          type: string
          example: "Productos validados correctamente"

    ControlCalidadResponseConsultaExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_validacion:
          type: string
          maxLength: 50
          example: "CAL-000321"
        estado:
          type: string
          maxLength: 30
          example: "registrado"
        mensaje:
          type: string
          example: "Consulta realizada correctamente"

    ControlCalidadResponseActualizarExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_validacion:
          type: string
          maxLength: 50
          example: "CAL-000321"
        estado:
          type: string
          maxLength: 30
          example: "actualizado"
        mensaje:
          type: string
          example: "Registro actualizado correctamente"

    ControlCalidadResponseError400:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "DATOS_INVALIDOS"
        detalle:
          type: string
          maxLength: 250
          example: "La lista de productos no puede estar vacía."

    ControlCalidadResponseError404:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "RECURSO_NO_ENCONTRADO"
        detalle:
          type: string
          maxLength: 250
          example: "No se encontró el registro solicitado."

    ControlCalidadResponseError409:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "PRODUCTOS_YA_VALIDADOS"
        detalle:
          type: string
          maxLength: 250
          example: "Uno o más productos ya fueron validados previamente."
