openapi: 3.0.0

info:
  title: Svc_SincronizacionERP_WMS - API de Integración Logística
  description: |
    Servicio encargado de sincronizar pedidos generados en el ERP con el sistema WMS, permitiendo la transferencia de información necesaria para la gestión de almacén y despacho.

    ---

    **Información Técnica del Servicio:**

    * **Protocolo:** REST / HTTPS / JSON

    * **Puerto del protocolo:** 8081 (Entorno Local)

    * **Tipo de servicio:** Integración

    * **Justificación SOA:** Interoperabilidad entre sistemas heterogéneos y bajo acoplamiento entre ERP y WMS.

    ---
  version: 1.0.0

servers:
  - url: http://localhost:8081/api/integracion
    description: Servidor Local de Desarrollo (Puerto 8081)

paths:
  /erp-wms/sincronizaciones:
    post:
      tags:
        - Integración
      operationId: registrarSincronizacionERP_WMS
      summary: Sincronizar pedido ERP con WMS
      description: Crea o ejecuta una nueva operación del módulo SincronizacionERP_WMS.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SincronizacionERP_WMSRequest'
            example:
              id_pedido_erp: "ERP-000125"
              id_cliente: 150
              fecha_pedido: "2026-05-29"
              id_producto: "SKU_IK_1.5L"
              cantidad: 120
              id_centro_distribucion: "CD_PUCUSANA"
      responses:
        '201':
          description: Registro creado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SincronizacionERP_WMSResponseExito'
              example:
                ok: true
                id_pedido_wms: "WMS-000987"
                mensaje: "Pedido sincronizado correctamente con el WMS"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SincronizacionERP_WMSResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "El pedido ERP contiene datos incompletos o inválidos."
        '409':
          description: Conflicto o duplicado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SincronizacionERP_WMSResponseError409'
              example:
                ok: false
                error: "PEDIDO_DUPLICADO"
                detalle: "El pedido ERP ya fue sincronizado previamente con el WMS."

  /erp-wms/sincronizaciones/{id_sincronizacion}:
    get:
      tags:
        - Integración
      operationId: consultarSincronizacionERP_WMS
      summary: Consultar registro
      description: Consulta el resultado de una operación previamente registrada.
      parameters:
        - name: id_sincronizacion
          in: path
          required: true
          description: Identificador del registro a consultar.
          schema:
            type: string
            maxLength: 50
            example: "SYNC-000987"
      responses:
        '200':
          description: Consulta realizada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SincronizacionERP_WMSResponseConsultaExito'
              example:
                ok: true
                id_sincronizacion: "SYNC-000987"
                estado: "registrado"
                mensaje: "Consulta realizada correctamente"
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SincronizacionERP_WMSResponseError404'
              example:
                ok: false
                error: "RECURSO_NO_ENCONTRADO"
                detalle: "No se encontró el registro solicitado."

    put:
      tags:
        - Integración
      operationId: actualizarSincronizacionERP_WMS
      summary: Actualizar registro
      description: Actualiza o corrige el estado de un registro existente.
      parameters:
        - name: id_sincronizacion
          in: path
          required: true
          description: Identificador del registro a actualizar.
          schema:
            type: string
            maxLength: 50
            example: "SYNC-000987"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SincronizacionERP_WMSRequestActualizar'
      responses:
        '200':
          description: Registro actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SincronizacionERP_WMSResponseActualizarExito'
              example:
                ok: true
                id_sincronizacion: "SYNC-000987"
                estado: "actualizado"
                mensaje: "Registro actualizado correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SincronizacionERP_WMSResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "El pedido ERP contiene datos incompletos o inválidos."
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SincronizacionERP_WMSResponseError404'
              example:
                ok: false
                error: "RECURSO_NO_ENCONTRADO"
                detalle: "No se encontró el registro solicitado."

security:
  - bearerAuth: []

components:
  schemas:
    SincronizacionERP_WMSRequest:
      type: object
      required:
        - id_pedido_erp
        - id_cliente
        - fecha_pedido
        - id_producto
        - cantidad
      properties:
        id_pedido_erp:
          type: string
          maxLength: 50
          description: "Código único del pedido generado en el ERP."
          example: "ERP-000125"
        id_cliente:
          type: integer
          description: "Identificador del cliente asociado al pedido."
          example: 150
        fecha_pedido:
          type: string
          format: date
          description: "Fecha de emisión del pedido en el ERP."
          example: "2026-05-29"
        id_producto:
          type: string
          maxLength: 50
          description: "Código SKU del producto solicitado."
          example: "SKU_IK_1.5L"
        cantidad:
          type: integer
          minimum: 1
          description: "Cantidad solicitada para despacho."
          example: 120
        id_centro_distribucion:
          type: string
          maxLength: 20
          description: "Código del centro de distribución destino."
          example: "CD_PUCUSANA"

    SincronizacionERP_WMSRequestActualizar:
      type: object
      required:
        - estado
      properties:
        estado:
          type: string
          maxLength: 30
          description: "Nuevo estado del registro."
          example: "actualizado"
        observacion:
          type: string
          maxLength: 250
          description: "Comentario asociado a la actualización."
          example: "Actualización registrada correctamente."

    SincronizacionERP_WMSResponseExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_pedido_wms:
          type: string
          maxLength: 50
          example: "WMS-000987"
        mensaje:
          type: string
          example: "Pedido sincronizado correctamente con el WMS"

    SincronizacionERP_WMSResponseConsultaExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_sincronizacion:
          type: string
          maxLength: 50
          example: "SYNC-000987"
        estado:
          type: string
          maxLength: 30
          example: "registrado"
        mensaje:
          type: string
          example: "Consulta realizada correctamente"

    SincronizacionERP_WMSResponseActualizarExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_sincronizacion:
          type: string
          maxLength: 50
          example: "SYNC-000987"
        estado:
          type: string
          maxLength: 30
          example: "actualizado"
        mensaje:
          type: string
          example: "Registro actualizado correctamente"

    SincronizacionERP_WMSResponseError400:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "DATOS_INVALIDOS"
        detalle:
          type: string
          maxLength: 250
          example: "El pedido ERP contiene datos incompletos o inválidos."

    SincronizacionERP_WMSResponseError404:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "RECURSO_NO_ENCONTRADO"
        detalle:
          type: string
          maxLength: 250
          example: "No se encontró el registro solicitado."

    SincronizacionERP_WMSResponseError409:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "PEDIDO_DUPLICADO"
        detalle:
          type: string
          maxLength: 250
          example: "El pedido ERP ya fue sincronizado previamente con el WMS."
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

