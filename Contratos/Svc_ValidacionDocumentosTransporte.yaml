openapi: 3.0.0

info:
  title: Svc_ValidacionDocumentosTransporte - API de Logística
  description: |
    Servicio encargado de validar los documentos de transporte antes del despacho, verificando la integridad y consistencia documentaria requerida para la operación logística.

    ---

    **Información Técnica del Servicio:**

    * **Protocolo:** REST / HTTPS / JSON

    * **Puerto del protocolo:** 8081 (Entorno Local)

    * **Tipo de servicio:** Tarea

    * **Justificación SOA:** Encapsulación, ya que centraliza las validaciones documentarias previas al despacho.

    ---
  version: 1.0.0

servers:
  - url: http://localhost:8081/api/logistica
    description: Servidor Local de Desarrollo (Puerto 8081)

paths:
  /documentos-transporte/validaciones:
    post:
      tags:
        - Logística
      operationId: registrarValidacionDocumentosTransporte
      summary: Ejecutar validación de documentos
      description: Crea o ejecuta una nueva operación del módulo ValidacionDocumentosTransporte.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidacionDocumentosTransporteRequest'
            example:
              id_despacho: "DESP-000125"
              id_transportista: "TR-000125"
      responses:
        '200':
          description: Operación ejecutada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidacionDocumentosTransporteResponseExito'
              example:
                ok: true
                validacion_correcta: true
                estado: "documentos_validados"
                mensaje: "Documentos de transporte validados correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidacionDocumentosTransporteResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "La información documentaria enviada es inválida o incompleta."
        '409':
          description: Conflicto o duplicado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidacionDocumentosTransporteResponseError409'
              example:
                ok: false
                error: "DOCUMENTOS_INVALIDOS"
                detalle: "Uno o más documentos requeridos no son válidos o se encuentran vencidos."

  /documentos-transporte/validaciones/{id_validacion}:
    get:
      tags:
        - Logística
      operationId: consultarValidacionDocumentosTransporte
      summary: Consultar registro
      description: Consulta el resultado de una operación previamente registrada.
      parameters:
        - name: id_validacion
          in: path
          required: true
          description: Identificador del registro a consultar.
          schema:
            type: string
            maxLength: 50
            example: "VDT-000321"
      responses:
        '200':
          description: Consulta realizada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidacionDocumentosTransporteResponseConsultaExito'
              example:
                ok: true
                id_validacion: "VDT-000321"
                estado: "registrado"
                mensaje: "Consulta realizada correctamente"
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidacionDocumentosTransporteResponseError404'
              example:
                ok: false
                error: "RECURSO_NO_ENCONTRADO"
                detalle: "No se encontró el registro solicitado."

    put:
      tags:
        - Logística
      operationId: actualizarValidacionDocumentosTransporte
      summary: Actualizar registro
      description: Actualiza o corrige el estado de un registro existente.
      parameters:
        - name: id_validacion
          in: path
          required: true
          description: Identificador del registro a actualizar.
          schema:
            type: string
            maxLength: 50
            example: "VDT-000321"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidacionDocumentosTransporteRequestActualizar'
      responses:
        '200':
          description: Registro actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidacionDocumentosTransporteResponseActualizarExito'
              example:
                ok: true
                id_validacion: "VDT-000321"
                estado: "actualizado"
                mensaje: "Registro actualizado correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidacionDocumentosTransporteResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "La información documentaria enviada es inválida o incompleta."
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidacionDocumentosTransporteResponseError404'
              example:
                ok: false
                error: "RECURSO_NO_ENCONTRADO"
                detalle: "No se encontró el registro solicitado."

components:
  schemas:
    ValidacionDocumentosTransporteRequest:
      type: object
      required:
        - id_despacho
        - documentos
      properties:
        id_despacho:
          type: string
          maxLength: 50
          description: "Código único del despacho asociado a la validación."
          example: "DESP-000125"
        id_transportista:
          type: string
          maxLength: 50
          description: "Código del transportista asociado al despacho."
          example: "TR-000125"
        documentos:
          type: array
          description: "Listado de documentos que serán validados antes del despacho."
          items:
            type: object
            properties:
              tipo_documento:
                type: string
                maxLength: 50
                example: "guia_remision"
              numero_documento:
                type: string
                maxLength: 50
                example: "T001-00001234"

    ValidacionDocumentosTransporteRequestActualizar:
      type: object
      required:
        - estado
      properties:
        estado:
          type: string
          maxLength: 30
          description: "Nuevo estado del registro."
          example: "actualizado"
        observacion:
          type: string
          maxLength: 250
          description: "Comentario asociado a la actualización."
          example: "Actualización registrada correctamente."

    ValidacionDocumentosTransporteResponseExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        validacion_correcta:
          type: boolean
          example: true
        estado:
          type: string
          maxLength: 30
          example: "documentos_validados"
        mensaje:
          type: string
          example: "Documentos de transporte validados correctamente"

    ValidacionDocumentosTransporteResponseConsultaExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_validacion:
          type: string
          maxLength: 50
          example: "VDT-000321"
        estado:
          type: string
          maxLength: 30
          example: "registrado"
        mensaje:
          type: string
          example: "Consulta realizada correctamente"

    ValidacionDocumentosTransporteResponseActualizarExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_validacion:
          type: string
          maxLength: 50
          example: "VDT-000321"
        estado:
          type: string
          maxLength: 30
          example: "actualizado"
        mensaje:
          type: string
          example: "Registro actualizado correctamente"

    ValidacionDocumentosTransporteResponseError400:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "DATOS_INVALIDOS"
        detalle:
          type: string
          maxLength: 250
          example: "La información documentaria enviada es inválida o incompleta."

    ValidacionDocumentosTransporteResponseError404:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "RECURSO_NO_ENCONTRADO"
        detalle:
          type: string
          maxLength: 250
          example: "No se encontró el registro solicitado."

    ValidacionDocumentosTransporteResponseError409:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "DOCUMENTOS_INVALIDOS"
        detalle:
          type: string
          maxLength: 250
          example: "Uno o más documentos requeridos no son válidos o se encuentran vencidos."
