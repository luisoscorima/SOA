openapi: 3.0.0

info:
  title: Svc_ValidacionInventario - API de WMS
  description: |
    Servicio encargado de validar la disponibilidad de stock en el WMS, confirmando si existe inventario suficiente para atender procesos de venta o logística.

    ---

    **Información Técnica del Servicio:**

    * **Protocolo:** REST / HTTPS / JSON

    * **Puerto del protocolo:** 8081 (Entorno Local)

    * **Tipo de servicio:** Tarea

    * **Justificación SOA:** Interoperabilidad, al ser compartido entre ERP y WMS. Reusabilidad, al ser utilizado en procesos de ventas y logística.

    ---
  version: 1.0.0

servers:
  - url: http://localhost:8081/api/wms
    description: Servidor Local de Desarrollo (Puerto 8081)

paths:

  /inventario/validar:
    get:
      tags:
        - WMS
      operationId: validarInventario
      summary: Validar inventario (consulta rápida)
      description: Consulta directa sin identificador de registro previo.
      parameters:
        - name: id_producto
          in: query
          required: true
          schema:
            type: string
            minLength: 3
            maxLength: 50
            example: "SKU_IK_1.5L"
        - name: cantidad
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 10000
            example: 120
        - name: id_almacen
          in: query
          required: false
          schema:
            type: string
            maxLength: 20
            example: "ALM_LIMA"
      responses:
        '200':
          description: Consulta realizada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidacionInventarioResponseExito'
              example:
                ok: true
                disponible: true
                stock_actual: 350
                confirmacion: "Stock disponible para atender la solicitud"
                id_producto: "SKU_IK_1.5L"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidacionInventarioResponseError400'
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidacionInventarioResponseError404'
  /inventario/validaciones:
    post:
      tags:
        - WMS
      operationId: registrarValidacionInventario
      summary: Ejecutar validación de inventario
      description: Crea o ejecuta una nueva operación del módulo ValidacionInventario.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidacionInventarioRequest'
            example:
              id_producto: "SKU_IK_1.5L"
              cantidad: 120
              id_almacen: "ALM_LIMA"
      responses:
        '200':
          description: Operación ejecutada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidacionInventarioResponseExito'
              example:
                ok: true
                disponible: true
                stock_actual: 350
                confirmacion: "Stock disponible para atender la solicitud"
                id_producto: "SKU_IK_1.5L"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidacionInventarioResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "La cantidad solicitada debe ser mayor a cero."
        '409':
          description: Conflicto o duplicado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidacionInventarioResponseError409'
              example:
                ok: false
                error: "CONFLICTO"
                detalle: "El registro ya existe o presenta un conflicto operativo."

  /inventario/validaciones/{id_validacion}:
    get:
      tags:
        - WMS
      operationId: consultarValidacionInventario
      summary: Consultar registro
      description: Consulta el resultado de una operación previamente registrada.
      parameters:
        - name: id_validacion
          in: path
          required: true
          description: Identificador del registro a consultar.
          schema:
            type: string
            maxLength: 50
            example: "VINV-000321"
      responses:
        '200':
          description: Consulta realizada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidacionInventarioResponseConsultaExito'
              example:
                ok: true
                id_validacion: "VINV-000321"
                estado: "registrado"
                mensaje: "Consulta realizada correctamente"
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidacionInventarioResponseError404'
              example:
                ok: false
                error: "PRODUCTO_NO_ENCONTRADO"
                detalle: "No se encontró stock registrado para el producto solicitado."

    put:
      tags:
        - WMS
      operationId: actualizarValidacionInventario
      summary: Actualizar registro
      description: Actualiza o corrige el estado de un registro existente.
      parameters:
        - name: id_validacion
          in: path
          required: true
          description: Identificador del registro a actualizar.
          schema:
            type: string
            maxLength: 50
            example: "VINV-000321"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidacionInventarioRequestActualizar'
      responses:
        '200':
          description: Registro actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidacionInventarioResponseActualizarExito'
              example:
                ok: true
                id_validacion: "VINV-000321"
                estado: "actualizado"
                mensaje: "Registro actualizado correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidacionInventarioResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "La cantidad solicitada debe ser mayor a cero."
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidacionInventarioResponseError404'
              example:
                ok: false
                error: "PRODUCTO_NO_ENCONTRADO"
                detalle: "No se encontró stock registrado para el producto solicitado."

components:
  schemas:
    ValidacionInventarioRequest:
      type: object
      required:
        - id_producto
        - cantidad
      properties:
        id_producto:
          type: string
          minLength: 3
          maxLength: 50
          description: "Código único del producto a validar."
          example: "SKU_IK_1.5L"
        cantidad:
          type: integer
          minimum: 1
          maximum: 10000
          description: "Cantidad solicitada para validar disponibilidad."
          example: 120
        id_almacen:
          type: string
          maxLength: 20
          description: "Código del almacén donde se realizará la validación. Opcional."
          example: "ALM_LIMA"

    ValidacionInventarioRequestActualizar:
      type: object
      required:
        - estado
      properties:
        estado:
          type: string
          maxLength: 30
          description: "Nuevo estado del registro."
          example: "actualizado"
        observacion:
          type: string
          maxLength: 250
          description: "Comentario asociado a la actualización."
          example: "Actualización registrada correctamente."

    ValidacionInventarioResponseExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        disponible:
          type: boolean
          example: true
        stock_actual:
          type: integer
          minimum: 0
          example: 350
        confirmacion:
          type: string
          maxLength: 100
          example: "Stock disponible para atender la solicitud"
        id_producto:
          type: string
          maxLength: 50
          example: "SKU_IK_1.5L"

    ValidacionInventarioResponseConsultaExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_validacion:
          type: string
          maxLength: 50
          example: "VINV-000321"
        estado:
          type: string
          maxLength: 30
          example: "registrado"
        mensaje:
          type: string
          example: "Consulta realizada correctamente"

    ValidacionInventarioResponseActualizarExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_validacion:
          type: string
          maxLength: 50
          example: "VINV-000321"
        estado:
          type: string
          maxLength: 30
          example: "actualizado"
        mensaje:
          type: string
          example: "Registro actualizado correctamente"

    ValidacionInventarioResponseError400:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "DATOS_INVALIDOS"
        detalle:
          type: string
          maxLength: 250
          example: "La cantidad solicitada debe ser mayor a cero."

    ValidacionInventarioResponseError404:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "PRODUCTO_NO_ENCONTRADO"
        detalle:
          type: string
          maxLength: 250
          example: "No se encontró stock registrado para el producto solicitado."

    ValidacionInventarioResponseError409:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "CONFLICTO"
        detalle:
          type: string
          maxLength: 250
          example: "El registro ya existe o presenta un conflicto operativo."
