openapi: 3.0.0

info:
  title: Svc_ActualizacionStockAutomatico - API de ERP/WMS
  description: |
    Servicio encargado de actualizar automáticamente el stock a partir de movimientos de inventario, manteniendo la sincronización entre el inventario físico del WMS y el inventario lógico del ERP.

    ---

    **Información Técnica del Servicio:**

    * **Protocolo:** REST / HTTPS / JSON

    * **Puerto del protocolo:** 8081 (Entorno Local)

    * **Tipo de servicio:** Integración

    * **Justificación SOA:** Mantiene la sincronización automática entre inventario físico y lógico, integrando los movimientos registrados en WMS con el stock del ERP.

    ---
  version: 1.0.0

servers:
  - url: http://localhost:8081/api/inventario
    description: Servidor Local de Desarrollo (Puerto 8081)

paths:
  /stock:
    post:
      tags:
        - Integración
      operationId: registrarActualizacionStockAutomatico
      summary: Registrar movimiento de stock
      description: Crea o ejecuta una nueva operación del módulo ActualizacionStockAutomatico.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActualizacionStockAutomaticoRequest'
            example:
              id_movimiento: "MOV-000125"
              id_almacen: "ALM_LIMA"
              tipo_movimiento: "salida"
              cantidad: 120
              sistema_origen: "WMS"
      responses:
        '201':
          description: Operación registrada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActualizacionStockAutomaticoResponseExito'
              example:
                ok: true
                id_actualizacion: "STOCK-000321"
                id_producto: "SKU_IK_1.5L"
                stock_actualizado: 230
                estado: "actualizado"
                mensaje: "Stock actualizado correctamente en ERP/WMS"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActualizacionStockAutomaticoResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "La información del movimiento de inventario es inválida o incompleta."
        '409':
          description: Conflicto o duplicado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActualizacionStockAutomaticoResponseError409'
              example:
                ok: false
                error: "MOVIMIENTO_YA_PROCESADO"
                detalle: "El movimiento de inventario enviado ya fue procesado previamente."

  /stock/{id_producto}:
    get:
      tags:
        - Integración
      operationId: consultarActualizacionStockAutomatico
      summary: Consultar registro
      description: Consulta el resultado de una operación previamente registrada.
      parameters:
        - name: id_producto
          in: path
          required: true
          description: Identificador del registro a consultar.
          schema:
            type: string
            maxLength: 50
            example: "SKU_IK_1.5L"
      responses:
        '200':
          description: Consulta realizada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActualizacionStockAutomaticoResponseConsultaExito'
              example:
                ok: true
                id_producto: "SKU_IK_1.5L"
                estado: "registrado"
                mensaje: "Consulta realizada correctamente"
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActualizacionStockAutomaticoResponseError404'
              example:
                ok: false
                error: "RECURSO_NO_ENCONTRADO"
                detalle: "No se encontró el registro solicitado."

    put:
      tags:
        - Integración
      operationId: actualizarActualizacionStockAutomatico
      summary: Actualizar registro
      description: Actualiza o corrige el estado de un registro existente.
      parameters:
        - name: id_producto
          in: path
          required: true
          description: Identificador del registro a actualizar.
          schema:
            type: string
            maxLength: 50
            example: "SKU_IK_1.5L"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActualizacionStockAutomaticoRequestActualizar'
      responses:
        '200':
          description: Registro actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActualizacionStockAutomaticoResponseActualizarExito'
              example:
                ok: true
                id_producto: "SKU_IK_1.5L"
                estado: "actualizado"
                mensaje: "Registro actualizado correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActualizacionStockAutomaticoResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "La información del movimiento de inventario es inválida o incompleta."
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActualizacionStockAutomaticoResponseError404'
              example:
                ok: false
                error: "RECURSO_NO_ENCONTRADO"
                detalle: "No se encontró el registro solicitado."

components:
  schemas:
    ActualizacionStockAutomaticoRequest:
      type: object
      required:
        - id_movimiento
        - id_almacen
        - tipo_movimiento
        - cantidad
        - sistema_origen
      properties:
        id_movimiento:
          type: string
          maxLength: 50
          description: "Código único del movimiento de inventario registrado."
          example: "MOV-000125"
        id_almacen:
          type: string
          maxLength: 20
          description: "Código del almacén donde se genera el movimiento."
          example: "ALM_LIMA"
        tipo_movimiento:
          type: string
          maxLength: 30
          description: "Tipo de movimiento de inventario registrado."
          example: "salida"
        cantidad:
          type: integer
          minimum: 1
          description: "Cantidad de unidades afectadas por el movimiento."
          example: 120
        sistema_origen:
          type: string
          maxLength: 20
          description: "Sistema desde donde se origina el movimiento de inventario."
          example: "WMS"

    ActualizacionStockAutomaticoRequestActualizar:
      type: object
      required:
        - estado
      properties:
        estado:
          type: string
          maxLength: 30
          description: "Nuevo estado del registro."
          example: "actualizado"
        observacion:
          type: string
          maxLength: 250
          description: "Comentario asociado a la actualización."
          example: "Actualización registrada correctamente."

    ActualizacionStockAutomaticoResponseExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_actualizacion:
          type: string
          maxLength: 50
          example: "STOCK-000321"
        id_producto:
          type: string
          maxLength: 50
          example: "SKU_IK_1.5L"
        stock_actualizado:
          type: integer
          minimum: 0
          example: 230
        estado:
          type: string
          maxLength: 30
          example: "actualizado"
        mensaje:
          type: string
          example: "Stock actualizado correctamente en ERP/WMS"

    ActualizacionStockAutomaticoResponseConsultaExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_producto:
          type: string
          maxLength: 50
          example: "SKU_IK_1.5L"
        estado:
          type: string
          maxLength: 30
          example: "registrado"
        mensaje:
          type: string
          example: "Consulta realizada correctamente"

    ActualizacionStockAutomaticoResponseActualizarExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_producto:
          type: string
          maxLength: 50
          example: "SKU_IK_1.5L"
        estado:
          type: string
          maxLength: 30
          example: "actualizado"
        mensaje:
          type: string
          example: "Registro actualizado correctamente"

    ActualizacionStockAutomaticoResponseError400:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "DATOS_INVALIDOS"
        detalle:
          type: string
          maxLength: 250
          example: "La información del movimiento de inventario es inválida o incompleta."

    ActualizacionStockAutomaticoResponseError404:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "RECURSO_NO_ENCONTRADO"
        detalle:
          type: string
          maxLength: 250
          example: "No se encontró el registro solicitado."

    ActualizacionStockAutomaticoResponseError409:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "MOVIMIENTO_YA_PROCESADO"
        detalle:
          type: string
          maxLength: 250
          example: "El movimiento de inventario enviado ya fue procesado previamente."
