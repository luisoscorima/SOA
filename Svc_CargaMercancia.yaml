openapi: 3.0.0

info:
  title: Svc_CargaMercancia - API de Logística
  description: |
    Servicio encargado de registrar la carga de mercancía en el camión asignado, representando el proceso físico de carga como una operación lógica dentro del sistema logístico.

    ---

    **Información Técnica del Servicio:**

    * **Protocolo:** REST / HTTPS / JSON

    * **Puerto del protocolo:** 8081 (Entorno Local)

    * **Tipo de servicio:** Tarea

    * **Justificación SOA:** Abstracción, ya que representa un proceso físico como un servicio lógico.

    ---
  version: 1.0.0

servers:
  - url: http://localhost:8081/api/logistica
    description: Servidor Local de Desarrollo (Puerto 8081)

paths:
  /mercancia/cargas:
    post:
      tags:
        - Logística
      operationId: registrarCargaMercancia
      summary: Registrar carga de mercancía
      description: Crea o ejecuta una nueva operación del módulo CargaMercancia.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CargaMercanciaRequest'
            example:
              id_camion: "CAM-000321"
              placa_vehiculo: "ABC-123"
              id_transportista: "TR-000125"
      responses:
        '201':
          description: Registro creado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CargaMercanciaResponseExito'
              example:
                ok: true
                id_carga: "CARGA-000654"
                estado_camion: "cargado"
                cantidad_pallets: 1
                mensaje: "Camión cargado correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CargaMercanciaResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "La lista de pallets no puede estar vacía."
        '409':
          description: Conflicto o duplicado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CargaMercanciaResponseError409'
              example:
                ok: false
                error: "PALLETS_YA_CARGADOS"
                detalle: "Uno o más pallets ya fueron cargados previamente en un camión."

  /m
  /mercancia/cargas/{id_carga}:
    get:
      tags:
        - Logística
      operationId: consultarCargaMercancia
      summary: Consultar registro
      description: Consulta el resultado de una operación previamente registrada.
      parameters:
        - name: id_carga
          in: path
          required: true
          description: Identificador del registro a consultar.
          schema:
            type: string
            maxLength: 50
            example: "CARGA-000654"
      responses:
        '200':
          description: Consulta realizada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CargaMercanciaResponseConsultaExito'
              example:
                ok: true
                id_carga: "CARGA-000654"
                estado: "registrado"
                mensaje: "Consulta realizada correctamente"
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CargaMercanciaResponseError404'
              example:
                ok: false
                error: "RECURSO_NO_ENCONTRADO"
                detalle: "No se encontró el registro solicitado."

    put:
      tags:
        - Logística
      operationId: actualizarCargaMercancia
      summary: Actualizar registro
      description: "Actualiza o corrige el estado de un registro existente. Para anular, envíe estado anulado."
      parameters:
        - name: id_carga
          in: path
          required: true
          description: Identificador del registro a actualizar.
          schema:
            type: string
            maxLength: 50
            example: "CARGA-000654"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CargaMercanciaRequestActualizar'
      responses:
        '200':
          description: Registro actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CargaMercanciaResponseActualizarExito'
              example:
                ok: true
                id_carga: "CARGA-000654"
                estado: "actualizado"
                mensaje: "Registro actualizado correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CargaMercanciaResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "La lista de pallets no puede estar vacía."
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CargaMercanciaResponseError404'
              example:
                ok: false
                error: "RECURSO_NO_ENCONTRADO"
                detalle: "No se encontró el registro solicitado."

components:
  schemas:
    CargaMercanciaRequest:
      type: object
      required:
        - id_camion
        - placa_vehiculo
        - pallets
      properties:
        id_camion:
          type: string
          maxLength: 50
          description: "Código único del camión asignado para el despacho."
          example: "CAM-000321"
        placa_vehiculo:
          type: string
          maxLength: 10
          description: "Placa del vehículo donde se cargará la mercancía."
          example: "ABC-123"
        id_transportista:
          type: string
          maxLength: 50
          description: "Código del transportista responsable del traslado."
          example: "TR-000125"
        pallets:
          type: array
          description: "Listado de pallets que serán cargados en el camión."
          items:
            type: object
            properties:
              id_pallet:
                type: string
                maxLength: 50
                example: "PALLET-000987"
              codigo_lpn:
                type: string
                maxLength: 50
                example: "LPN-2026-000458"

    CargaMercanciaRequestActualizar:
      type: object
      required:
        - estado
      properties:
        estado:
          type: string
          maxLength: 30
          description: "Nuevo estado del registro. Use \"anulado\" para cancelar sin eliminar."
          example: "actualizado"
        observacion:
          type: string
          maxLength: 250
          description: "Comentario asociado a la actualización."
          example: "Actualización registrada correctamente."

    CargaMercanciaResponseExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_carga:
          type: string
          maxLength: 50
          example: "CARGA-000654"
        estado_camion:
          type: string
          maxLength: 30
          example: "cargado"
        cantidad_pallets:
          type: integer
          example: 1
        mensaje:
          type: string
          example: "Camión cargado correctamente"

    CargaMercanciaResponseConsultaExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_carga:
          type: string
          maxLength: 50
          example: "CARGA-000654"
        estado:
          type: string
          maxLength: 30
          example: "registrado"
        mensaje:
          type: string
          example: "Consulta realizada correctamente"

    CargaMercanciaResponseActualizarExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_carga:
          type: string
          maxLength: 50
          example: "CARGA-000654"
        estado:
          type: string
          maxLength: 30
          example: "actualizado"
        mensaje:
          type: string
          example: "Registro actualizado correctamente"

    CargaMercanciaResponseError400:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "DATOS_INVALIDOS"
        detalle:
          type: string
          maxLength: 250
          example: "La lista de pallets no puede estar vacía."

    CargaMercanciaResponseError404:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "RECURSO_NO_ENCONTRADO"
        detalle:
          type: string
          maxLength: 250
          example: "No se encontró el registro solicitado."

    CargaMercanciaResponseError409:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "PALLETS_YA_CARGADOS"
        detalle:
          type: string
          maxLength: 250
          example: "Uno o más pallets ya fueron cargados previamente en un camión."
