openapi: 3.0.0

info:
  title: Svc_CierrePedidoERP - API de ERP
  description: |
    Servicio encargado de cerrar un pedido en el ERP una vez completado el proceso logístico, actualizando su estado comercial sin afectar directamente a otros sistemas.

    ---

    **Información Técnica del Servicio:**

    * **Protocolo:** REST / HTTPS / JSON

    * **Puerto del protocolo:** 8081 (Entorno Local)

    * **Tipo de servicio:** Integración

    * **Justificación SOA:** Bajo acoplamiento, ya que el ERP se actualiza de forma independiente sin afectar otros sistemas.

    ---
  version: 1.0.0

servers:
  - url: http://localhost:8081/api/erp
    description: Servidor Local de Desarrollo (Puerto 8081)

paths:
  /pedidos/cierres:
    post:
      tags:
        - ERP
      operationId: registrarCierrePedidoERP
      summary: Registrar solicitud de cierre de pedido
      description: Crea o ejecuta una nueva operación del módulo CierrePedidoERP.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CierrePedidoERPRequest'
            example:
              estado_final: "cerrado"
              fecha_cierre: "2026-05-29"
              observacion: "Pedido entregado y liquidado correctamente."
      responses:
        '200':
          description: Operación ejecutada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CierrePedidoERPResponseExito'
              example:
                ok: true
                id_pedido: "PED-000125"
                estado: "cerrado"
                mensaje: "Pedido cerrado correctamente en ERP"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CierrePedidoERPResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "La información enviada para el cierre del pedido es inválida o incompleta."
        '409':
          description: Conflicto o duplicado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CierrePedidoERPResponseError409'
              example:
                ok: false
                error: "PEDIDO_YA_CERRADO"
                detalle: "El pedido enviado ya se encuentra cerrado en el ERP."

  /p
  /pedidos/cierres/{id_cierre}:
    get:
      tags:
        - ERP
      operationId: consultarCierrePedidoERP
      summary: Consultar registro
      description: Consulta el resultado de una operación previamente registrada.
      parameters:
        - name: id_cierre
          in: path
          required: true
          description: Identificador del registro a consultar.
          schema:
            type: string
            maxLength: 50
            example: "CIERRE-000125"
      responses:
        '200':
          description: Consulta realizada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CierrePedidoERPResponseConsultaExito'
              example:
                ok: true
                id_cierre: "CIERRE-000125"
                estado: "registrado"
                mensaje: "Consulta realizada correctamente"
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CierrePedidoERPResponseError404'
              example:
                ok: false
                error: "RECURSO_NO_ENCONTRADO"
                detalle: "No se encontró el registro solicitado."

    put:
      tags:
        - ERP
      operationId: actualizarCierrePedidoERP
      summary: Actualizar registro
      description: Actualiza o corrige el estado de un registro existente.
      parameters:
        - name: id_cierre
          in: path
          required: true
          description: Identificador del registro a actualizar.
          schema:
            type: string
            maxLength: 50
            example: "CIERRE-000125"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CierrePedidoERPRequestActualizar'
      responses:
        '200':
          description: Registro actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CierrePedidoERPResponseActualizarExito'
              example:
                ok: true
                id_cierre: "CIERRE-000125"
                estado: "actualizado"
                mensaje: "Registro actualizado correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CierrePedidoERPResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "La información enviada para el cierre del pedido es inválida o incompleta."
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CierrePedidoERPResponseError404'
              example:
                ok: false
                error: "RECURSO_NO_ENCONTRADO"
                detalle: "No se encontró el registro solicitado."

components:
  schemas:
    CierrePedidoERPRequest:
      type: object
      required:
        - estado_final
        - fecha_cierre
      properties:
        estado_final:
          type: string
          maxLength: 30
          description: "Estado final asignado al pedido dentro del ERP."
          example: "cerrado"
        fecha_cierre:
          type: string
          format: date
          description: "Fecha de cierre del pedido."
          example: "2026-05-29"
        observacion:
          type: string
          maxLength: 250
          description: "Comentario adicional asociado al cierre del pedido."
          example: "Pedido entregado y liquidado correctamente."

    CierrePedidoERPRequestActualizar:
      type: object
      required:
        - estado
      properties:
        estado:
          type: string
          maxLength: 30
          description: "Nuevo estado del registro."
          example: "actualizado"
        observacion:
          type: string
          maxLength: 250
          description: "Comentario asociado a la actualización."
          example: "Actualización registrada correctamente."

    CierrePedidoERPResponseExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_pedido:
          type: string
          maxLength: 50
          example: "PED-000125"
        estado:
          type: string
          maxLength: 30
          example: "cerrado"
        mensaje:
          type: string
          example: "Pedido cerrado correctamente en ERP"

    CierrePedidoERPResponseConsultaExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_cierre:
          type: string
          maxLength: 50
          example: "CIERRE-000125"
        estado:
          type: string
          maxLength: 30
          example: "registrado"
        mensaje:
          type: string
          example: "Consulta realizada correctamente"

    CierrePedidoERPResponseActualizarExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_cierre:
          type: string
          maxLength: 50
          example: "CIERRE-000125"
        estado:
          type: string
          maxLength: 30
          example: "actualizado"
        mensaje:
          type: string
          example: "Registro actualizado correctamente"

    CierrePedidoERPResponseError400:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "DATOS_INVALIDOS"
        detalle:
          type: string
          maxLength: 250
          example: "La información enviada para el cierre del pedido es inválida o incompleta."

    CierrePedidoERPResponseError404:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "RECURSO_NO_ENCONTRADO"
        detalle:
          type: string
          maxLength: 250
          example: "No se encontró el registro solicitado."

    CierrePedidoERPResponseError409:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "PEDIDO_YA_CERRADO"
        detalle:
          type: string
          maxLength: 250
          example: "El pedido enviado ya se encuentra cerrado en el ERP."
