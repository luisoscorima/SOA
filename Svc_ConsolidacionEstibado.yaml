openapi: 3.0.0

info:
  title: Svc_ConsolidacionEstibado - API de WMS
  description: |
    Servicio encargado de consolidar productos y generar pallets para despacho dentro del WMS, organizando físicamente la carga de acuerdo con criterios logísticos definidos.

    ---

    **Información Técnica del Servicio:**

    * **Protocolo:** REST / HTTPS / JSON

    * **Puerto del protocolo:** 8081 (Entorno Local)

    * **Tipo de servicio:** Tarea

    * **Justificación SOA:** Autonomía, ya que opera independientemente del resto del flujo logístico.

    ---
  version: 1.0.0

servers:
  - url: http://localhost:8081/api/wms
    description: Servidor Local de Desarrollo (Puerto 8081)

paths:
  /consolidacion/estibados:
    post:
      tags:
        - WMS
      operationId: registrarConsolidacionEstibado
      summary: Registrar consolidación y estibado
      description: Crea o ejecuta una nueva operación del módulo ConsolidacionEstibado.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConsolidacionEstibadoRequest'
            example:
              id_operacion: "OP-000321"
              tipo_estibado: "despacho"
      responses:
        '201':
          description: Registro creado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsolidacionEstibadoResponseExito'
              example:
                ok: true
                id_pallet: "PALLET-000987"
                cantidad_productos: 120
                estado: "estibado"
                mensaje: "Productos consolidados y estibados correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsolidacionEstibadoResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "La información de productos enviada es inválida o incompleta."
        '409':
          description: Conflicto o duplicado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsolidacionEstibadoResponseError409'
              example:
                ok: false
                error: "PRODUCTOS_YA_ESTIBADOS"
                detalle: "Los productos enviados ya fueron asociados previamente a un pallet."

  /c
  /consolidacion/estibados/{id_consolidacion}:
    get:
      tags:
        - WMS
      operationId: consultarConsolidacionEstibado
      summary: Consultar registro
      description: Consulta el resultado de una operación previamente registrada.
      parameters:
        - name: id_consolidacion
          in: path
          required: true
          description: Identificador del registro a consultar.
          schema:
            type: string
            maxLength: 50
            example: "EST-000321"
      responses:
        '200':
          description: Consulta realizada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsolidacionEstibadoResponseConsultaExito'
              example:
                ok: true
                id_consolidacion: "EST-000321"
                estado: "registrado"
                mensaje: "Consulta realizada correctamente"
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsolidacionEstibadoResponseError404'
              example:
                ok: false
                error: "RECURSO_NO_ENCONTRADO"
                detalle: "No se encontró el registro solicitado."

    put:
      tags:
        - WMS
      operationId: actualizarConsolidacionEstibado
      summary: Actualizar registro
      description: Actualiza o corrige el estado de un registro existente. Para anular, envíe estado: anulado.
      parameters:
        - name: id_consolidacion
          in: path
          required: true
          description: Identificador del registro a actualizar.
          schema:
            type: string
            maxLength: 50
            example: "EST-000321"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConsolidacionEstibadoRequestActualizar'
      responses:
        '200':
          description: Registro actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsolidacionEstibadoResponseActualizarExito'
              example:
                ok: true
                id_consolidacion: "EST-000321"
                estado: "actualizado"
                mensaje: "Registro actualizado correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsolidacionEstibadoResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "La información de productos enviada es inválida o incompleta."
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsolidacionEstibadoResponseError404'
              example:
                ok: false
                error: "RECURSO_NO_ENCONTRADO"
                detalle: "No se encontró el registro solicitado."

components:
  schemas:
    ConsolidacionEstibadoRequest:
      type: object
      required:
        - id_operacion
        - productos
      properties:
        id_operacion:
          type: string
          maxLength: 50
          description: "Código único de la operación logística asociada."
          example: "OP-000321"
        tipo_estibado:
          type: string
          maxLength: 30
          description: "Tipo de estibado aplicado a los productos."
          example: "despacho"
        productos:
          type: array
          description: "Listado de productos a consolidar y estibar."
          items:
            type: object
            properties:
              id_producto:
                type: string
                maxLength: 50
                example: "SKU_IK_1.5L"
              cantidad:
                type: integer
                minimum: 1
                example: 120
              peso_total:
                type: number
                format: float
                minimum: 0
                example: 350.5

    ConsolidacionEstibadoRequestActualizar:
      type: object
      required:
        - estado
      properties:
        estado:
          type: string
          maxLength: 30
          description: "Nuevo estado del registro. Use \"anulado\" para cancelar sin eliminar."
          example: "actualizado"
        observacion:
          type: string
          maxLength: 250
          description: "Comentario asociado a la actualización."
          example: "Actualización registrada correctamente."

    ConsolidacionEstibadoResponseExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_pallet:
          type: string
          maxLength: 50
          example: "PALLET-000987"
        cantidad_productos:
          type: integer
          example: 120
        estado:
          type: string
          maxLength: 30
          example: "estibado"
        mensaje:
          type: string
          example: "Productos consolidados y estibados correctamente"

    ConsolidacionEstibadoResponseConsultaExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_consolidacion:
          type: string
          maxLength: 50
          example: "EST-000321"
        estado:
          type: string
          maxLength: 30
          example: "registrado"
        mensaje:
          type: string
          example: "Consulta realizada correctamente"

    ConsolidacionEstibadoResponseActualizarExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_consolidacion:
          type: string
          maxLength: 50
          example: "EST-000321"
        estado:
          type: string
          maxLength: 30
          example: "actualizado"
        mensaje:
          type: string
          example: "Registro actualizado correctamente"

    ConsolidacionEstibadoResponseError400:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "DATOS_INVALIDOS"
        detalle:
          type: string
          maxLength: 250
          example: "La información de productos enviada es inválida o incompleta."

    ConsolidacionEstibadoResponseError404:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "RECURSO_NO_ENCONTRADO"
        detalle:
          type: string
          maxLength: 250
          example: "No se encontró el registro solicitado."

    ConsolidacionEstibadoResponseError409:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "PRODUCTOS_YA_ESTIBADOS"
        detalle:
          type: string
          maxLength: 250
          example: "Los productos enviados ya fueron asociados previamente a un pallet."
