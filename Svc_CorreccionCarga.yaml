openapi: 3.0.0

info:
  title: Svc_CorreccionCarga - API de Logística
  description: |
    Servicio encargado de corregir errores detectados durante el proceso de carga logística, permitiendo ajustar registros de productos, pallets o cantidades antes del despacho final.

    ---

    **Información Técnica del Servicio:**

    * **Protocolo:** REST / HTTPS / JSON

    * **Puerto del protocolo:** 8081 (Entorno Local)

    * **Tipo de servicio:** Tarea

    * **Justificación SOA:** Resiliencia, ya que permite la recuperación del proceso ante errores operativos o inconsistencias de carga.

    ---
  version: 1.0.0

servers:
  - url: http://localhost:8081/api/logistica
    description: Servidor Local de Desarrollo (Puerto 8081)

paths:
  /carga/correcciones:
    post:
      tags:
        - Logística
      operationId: registrarCorreccionCarga
      summary: Registrar corrección de carga
      description: Crea o ejecuta una nueva operación del módulo CorreccionCarga.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CorreccionCargaRequest'
            example:
              id_carga: "CARGA-000654"
              id_error: "ERR-000125"
              tipo_error: "cantidad_incorrecta"
              correccion: "Se ajusta cantidad por diferencia detectada en escaneo."
      responses:
        '200':
          description: Operación ejecutada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CorreccionCargaResponseExito'
              example:
                ok: true
                id_correccion: "CORR-000321"
                estado: "corregido"
                mensaje: "Corrección de carga registrada correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CorreccionCargaResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "La información de corrección enviada es inválida o incompleta."
        '409':
          description: Conflicto o duplicado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CorreccionCargaResponseError409'
              example:
                ok: false
                error: "CONFLICTO"
                detalle: "El registro ya existe o presenta un conflicto operativo."

  /c
  /carga/correcciones/{id_correccion}:
    get:
      tags:
        - Logística
      operationId: consultarCorreccionCarga
      summary: Consultar registro
      description: Consulta el resultado de una operación previamente registrada.
      parameters:
        - name: id_correccion
          in: path
          required: true
          description: Identificador del registro a consultar.
          schema:
            type: string
            maxLength: 50
            example: "COR-000321"
      responses:
        '200':
          description: Consulta realizada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CorreccionCargaResponseConsultaExito'
              example:
                ok: true
                id_correccion: "COR-000321"
                estado: "registrado"
                mensaje: "Consulta realizada correctamente"
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CorreccionCargaResponseError404'
              example:
                ok: false
                error: "CARGA_O_ERROR_NO_ENCONTRADO"
                detalle: "No se encontró la carga o el error asociado a la corrección solicitada."

    put:
      tags:
        - Logística
      operationId: actualizarCorreccionCarga
      summary: Actualizar registro
      description: Actualiza o corrige el estado de un registro existente.
      parameters:
        - name: id_correccion
          in: path
          required: true
          description: Identificador del registro a actualizar.
          schema:
            type: string
            maxLength: 50
            example: "COR-000321"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CorreccionCargaRequestActualizar'
      responses:
        '200':
          description: Registro actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CorreccionCargaResponseActualizarExito'
              example:
                ok: true
                id_correccion: "COR-000321"
                estado: "actualizado"
                mensaje: "Registro actualizado correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CorreccionCargaResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "La información de corrección enviada es inválida o incompleta."
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CorreccionCargaResponseError404'
              example:
                ok: false
                error: "CARGA_O_ERROR_NO_ENCONTRADO"
                detalle: "No se encontró la carga o el error asociado a la corrección solicitada."

components:
  schemas:
    CorreccionCargaRequest:
      type: object
      required:
        - id_carga
        - id_error
        - tipo_error
        - correccion
      properties:
        id_carga:
          type: string
          maxLength: 50
          description: "Código único de la carga donde se detectó el error."
          example: "CARGA-000654"
        id_error:
          type: string
          maxLength: 50
          description: "Código único del error registrado durante el proceso de carga."
          example: "ERR-000125"
        tipo_error:
          type: string
          maxLength: 50
          description: "Tipo de error detectado en la carga."
          example: "cantidad_incorrecta"
        correccion:
          type: object
          description: "Detalle de la corrección aplicada al error registrado."
          properties:
            id_producto:
              type: string
              maxLength: 50
              example: "SKU_IK_1.5L"
            cantidad_correcta:
              type: integer
              minimum: 0
              example: 118
            observacion:
              type: string
              maxLength: 250
              example: "Se ajusta cantidad por diferencia detectada en escaneo."

    CorreccionCargaRequestActualizar:
      type: object
      required:
        - estado
      properties:
        estado:
          type: string
          maxLength: 30
          description: "Nuevo estado del registro."
          example: "actualizado"
        observacion:
          type: string
          maxLength: 250
          description: "Comentario asociado a la actualización."
          example: "Actualización registrada correctamente."

    CorreccionCargaResponseExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_correccion:
          type: string
          maxLength: 50
          example: "CORR-000321"
        estado:
          type: string
          maxLength: 30
          example: "corregido"
        mensaje:
          type: string
          example: "Corrección de carga registrada correctamente"

    CorreccionCargaResponseConsultaExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_correccion:
          type: string
          maxLength: 50
          example: "COR-000321"
        estado:
          type: string
          maxLength: 30
          example: "registrado"
        mensaje:
          type: string
          example: "Consulta realizada correctamente"

    CorreccionCargaResponseActualizarExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_correccion:
          type: string
          maxLength: 50
          example: "COR-000321"
        estado:
          type: string
          maxLength: 30
          example: "actualizado"
        mensaje:
          type: string
          example: "Registro actualizado correctamente"

    CorreccionCargaResponseError400:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "DATOS_INVALIDOS"
        detalle:
          type: string
          maxLength: 250
          example: "La información de corrección enviada es inválida o incompleta."

    CorreccionCargaResponseError404:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "CARGA_O_ERROR_NO_ENCONTRADO"
        detalle:
          type: string
          maxLength: 250
          example: "No se encontró la carga o el error asociado a la corrección solicitada."

    CorreccionCargaResponseError409:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "CONFLICTO"
        detalle:
          type: string
          maxLength: 250
          example: "El registro ya existe o presenta un conflicto operativo."
