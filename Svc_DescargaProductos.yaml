openapi: 3.0.0

info:
  title: Svc_DescargaProductos - API de Repartidor
  description: |
    Servicio encargado de registrar la descarga de productos en el punto de entrega, representando la entrega física de mercancía como una operación lógica del sistema.

    ---

    **Información Técnica del Servicio:**

    * **Protocolo:** REST / HTTPS / JSON

    * **Puerto del protocolo:** 8081 (Entorno Local)

    * **Tipo de servicio:** Tarea

    * **Justificación SOA:** Abstracción, ya que representa la entrega física de mercancía como un servicio lógico.

    ---
  version: 1.0.0

servers:
  - url: http://localhost:8081/api/repartidor
    description: Servidor Local de Desarrollo (Puerto 8081)

paths:
  /productos/descargas:
    post:
      tags:
        - Repartidor
      operationId: registrarDescargaProductos
      summary: Registrar descarga de productos
      description: Crea o ejecuta una nueva operación del módulo DescargaProductos.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DescargaProductosRequest'
            example:
              id_entrega: "ENT-000125"
              id_repartidor: "REP-001"
              id_cliente: 150
      responses:
        '200':
          description: Operación ejecutada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DescargaProductosResponseExito'
              example:
                ok: true
                id_descarga: "DESC-000321"
                estado_entrega: "descargado"
                mensaje: "Descarga de productos registrada correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DescargaProductosResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "La lista de productos descargados es inválida o incompleta."
        '409':
          description: Conflicto o duplicado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DescargaProductosResponseError409'
              example:
                ok: false
                error: "CONFLICTO"
                detalle: "El registro ya existe o presenta un conflicto operativo."

  /p
  /productos/descargas/{id_descarga}:
    get:
      tags:
        - Repartidor
      operationId: consultarDescargaProductos
      summary: Consultar registro
      description: Consulta el resultado de una operación previamente registrada.
      parameters:
        - name: id_descarga
          in: path
          required: true
          description: Identificador del registro a consultar.
          schema:
            type: string
            maxLength: 50
            example: "DES-000321"
      responses:
        '200':
          description: Consulta realizada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DescargaProductosResponseConsultaExito'
              example:
                ok: true
                id_descarga: "DES-000321"
                estado: "registrado"
                mensaje: "Consulta realizada correctamente"
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DescargaProductosResponseError404'
              example:
                ok: false
                error: "ENTREGA_NO_ENCONTRADA"
                detalle: "No se encontró una entrega registrada con el identificador enviado."

    put:
      tags:
        - Repartidor
      operationId: actualizarDescargaProductos
      summary: Actualizar registro
      description: Actualiza o corrige el estado de un registro existente.
      parameters:
        - name: id_descarga
          in: path
          required: true
          description: Identificador del registro a actualizar.
          schema:
            type: string
            maxLength: 50
            example: "DES-000321"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DescargaProductosRequestActualizar'
      responses:
        '200':
          description: Registro actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DescargaProductosResponseActualizarExito'
              example:
                ok: true
                id_descarga: "DES-000321"
                estado: "actualizado"
                mensaje: "Registro actualizado correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DescargaProductosResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "La lista de productos descargados es inválida o incompleta."
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DescargaProductosResponseError404'
              example:
                ok: false
                error: "ENTREGA_NO_ENCONTRADA"
                detalle: "No se encontró una entrega registrada con el identificador enviado."

components:
  schemas:
    DescargaProductosRequest:
      type: object
      required:
        - id_entrega
        - id_repartidor
        - productos
      properties:
        id_entrega:
          type: string
          maxLength: 50
          description: "Código único de la entrega asociada a la descarga."
          example: "ENT-000125"
        id_repartidor:
          type: string
          maxLength: 50
          description: "Código del repartidor responsable de la descarga."
          example: "REP-001"
        id_cliente:
          type: integer
          description: "Identificador del cliente que recibe la mercancía."
          example: 150
        productos:
          type: array
          description: "Listado de productos descargados en el punto de entrega."
          items:
            type: object
            properties:
              id_producto:
                type: string
                maxLength: 50
                example: "SKU_IK_1.5L"
              cantidad_descargada:
                type: integer
                minimum: 1
                example: 120

    DescargaProductosRequestActualizar:
      type: object
      required:
        - estado
      properties:
        estado:
          type: string
          maxLength: 30
          description: "Nuevo estado del registro."
          example: "actualizado"
        observacion:
          type: string
          maxLength: 250
          description: "Comentario asociado a la actualización."
          example: "Actualización registrada correctamente."

    DescargaProductosResponseExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_descarga:
          type: string
          maxLength: 50
          example: "DESC-000321"
        estado_entrega:
          type: string
          maxLength: 30
          example: "descargado"
        mensaje:
          type: string
          example: "Descarga de productos registrada correctamente"

    DescargaProductosResponseConsultaExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_descarga:
          type: string
          maxLength: 50
          example: "DES-000321"
        estado:
          type: string
          maxLength: 30
          example: "registrado"
        mensaje:
          type: string
          example: "Consulta realizada correctamente"

    DescargaProductosResponseActualizarExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_descarga:
          type: string
          maxLength: 50
          example: "DES-000321"
        estado:
          type: string
          maxLength: 30
          example: "actualizado"
        mensaje:
          type: string
          example: "Registro actualizado correctamente"

    DescargaProductosResponseError400:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "DATOS_INVALIDOS"
        detalle:
          type: string
          maxLength: 250
          example: "La lista de productos descargados es inválida o incompleta."

    DescargaProductosResponseError404:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "ENTREGA_NO_ENCONTRADA"
        detalle:
          type: string
          maxLength: 250
          example: "No se encontró una entrega registrada con el identificador enviado."

    DescargaProductosResponseError409:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "CONFLICTO"
        detalle:
          type: string
          maxLength: 250
          example: "El registro ya existe o presenta un conflicto operativo."
