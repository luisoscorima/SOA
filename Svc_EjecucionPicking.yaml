openapi: 3.0.0

info:
  title: Svc_EjecucionPicking - API de WMS
  description: |
    Servicio encargado de ejecutar el proceso de picking en el almacén, registrando los productos recolectados a partir de una lista de picking generada previamente.

    ---

    **Información Técnica del Servicio:**

    * **Protocolo:** REST / HTTPS / JSON

    * **Puerto del protocolo:** 8081 (Entorno Local)

    * **Tipo de servicio:** Tarea

    * **Justificación SOA:** Abstracción de la complejidad operativa del almacén.

    ---
  version: 1.0.0

servers:
  - url: http://localhost:8081/api/wms
    description: Servidor Local de Desarrollo (Puerto 8081)

paths:
  /picking/ejecuciones:
    post:
      tags:
        - WMS
      operationId: registrarEjecucionPicking
      summary: Ejecutar picking
      description: Crea o ejecuta una nueva operación del módulo EjecucionPicking.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EjecucionPickingRequest'
            example:
              id_lista_picking: "PICK-000789"
              id_operario: "OP-001"
      responses:
        '200':
          description: Operación ejecutada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EjecucionPickingResponseExito'
              example:
                ok: true
                id_ejecucion_picking: "EJPICK-000456"
                estado: "completado"
                mensaje: "Picking ejecutado correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EjecucionPickingResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "La lista de productos recolectados no puede estar vacía."
        '409':
          description: Conflicto o duplicado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EjecucionPickingResponseError409'
              example:
                ok: false
                error: "CONFLICTO"
                detalle: "El registro ya existe o presenta un conflicto operativo."

  /p
  /picking/ejecuciones/{id_ejecucion}:
    get:
      tags:
        - WMS
      operationId: consultarEjecucionPicking
      summary: Consultar registro
      description: Consulta el resultado de una operación previamente registrada.
      parameters:
        - name: id_ejecucion
          in: path
          required: true
          description: Identificador del registro a consultar.
          schema:
            type: string
            maxLength: 50
            example: "EJE-000321"
      responses:
        '200':
          description: Consulta realizada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EjecucionPickingResponseConsultaExito'
              example:
                ok: true
                id_ejecucion: "EJE-000321"
                estado: "registrado"
                mensaje: "Consulta realizada correctamente"
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EjecucionPickingResponseError404'
              example:
                ok: false
                error: "LISTA_PICKING_NO_ENCONTRADA"
                detalle: "No existe una lista de picking registrada con el identificador enviado."

    put:
      tags:
        - WMS
      operationId: actualizarEjecucionPicking
      summary: Actualizar registro
      description: Actualiza o corrige el estado de un registro existente. Para anular, envíe estado: anulado.
      parameters:
        - name: id_ejecucion
          in: path
          required: true
          description: Identificador del registro a actualizar.
          schema:
            type: string
            maxLength: 50
            example: "EJE-000321"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EjecucionPickingRequestActualizar'
      responses:
        '200':
          description: Registro actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EjecucionPickingResponseActualizarExito'
              example:
                ok: true
                id_ejecucion: "EJE-000321"
                estado: "actualizado"
                mensaje: "Registro actualizado correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EjecucionPickingResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "La lista de productos recolectados no puede estar vacía."
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EjecucionPickingResponseError404'
              example:
                ok: false
                error: "LISTA_PICKING_NO_ENCONTRADA"
                detalle: "No existe una lista de picking registrada con el identificador enviado."

components:
  schemas:
    EjecucionPickingRequest:
      type: object
      required:
        - id_lista_picking
        - id_operario
        - productos
      properties:
        id_lista_picking:
          type: string
          maxLength: 50
          description: "Código único de la lista de picking a ejecutar."
          example: "PICK-000789"
        id_operario:
          type: string
          maxLength: 20
          description: "Código del operario responsable de ejecutar el picking."
          example: "OP-001"
        productos:
          type: array
          description: "Listado de productos recolectados durante la ejecución del picking."
          items:
            type: object
            properties:
              id_producto:
                type: string
                maxLength: 50
                example: "SKU_IK_1.5L"
              cantidad_recolectada:
                type: integer
                minimum: 1
                example: 120
              ubicacion:
                type: string
                maxLength: 50
                example: "PASILLO-03-NIVEL-02"

    EjecucionPickingRequestActualizar:
      type: object
      required:
        - estado
      properties:
        estado:
          type: string
          maxLength: 30
          description: "Nuevo estado del registro. Use \"anulado\" para cancelar sin eliminar."
          example: "actualizado"
        observacion:
          type: string
          maxLength: 250
          description: "Comentario asociado a la actualización."
          example: "Actualización registrada correctamente."

    EjecucionPickingResponseExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_ejecucion_picking:
          type: string
          maxLength: 50
          example: "EJPICK-000456"
        estado:
          type: string
          maxLength: 30
          example: "completado"
        mensaje:
          type: string
          example: "Picking ejecutado correctamente"

    EjecucionPickingResponseConsultaExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_ejecucion:
          type: string
          maxLength: 50
          example: "EJE-000321"
        estado:
          type: string
          maxLength: 30
          example: "registrado"
        mensaje:
          type: string
          example: "Consulta realizada correctamente"

    EjecucionPickingResponseActualizarExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_ejecucion:
          type: string
          maxLength: 50
          example: "EJE-000321"
        estado:
          type: string
          maxLength: 30
          example: "actualizado"
        mensaje:
          type: string
          example: "Registro actualizado correctamente"

    EjecucionPickingResponseError400:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "DATOS_INVALIDOS"
        detalle:
          type: string
          maxLength: 250
          example: "La lista de productos recolectados no puede estar vacía."

    EjecucionPickingResponseError404:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "LISTA_PICKING_NO_ENCONTRADA"
        detalle:
          type: string
          maxLength: 250
          example: "No existe una lista de picking registrada con el identificador enviado."

    EjecucionPickingResponseError409:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "CONFLICTO"
        detalle:
          type: string
          maxLength: 250
          example: "El registro ya existe o presenta un conflicto operativo."
