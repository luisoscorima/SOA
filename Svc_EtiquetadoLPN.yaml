openapi: 3.0.0

info:
  title: Svc_EtiquetadoLPN - API de WMS
  description: |
    Servicio encargado de generar y asignar etiquetas LPN (License Plate Number) a pallets dentro del WMS, permitiendo una trazabilidad uniforme de las unidades logísticas.

    ---

    **Información Técnica del Servicio:**

    * **Protocolo:** REST / HTTPS / JSON

    * **Puerto del protocolo:** 8081 (Entorno Local)

    * **Tipo de servicio:** Entidad

    * **Justificación SOA:** Estandarización de la trazabilidad logística mediante códigos LPN únicos.

    ---
  version: 1.0.0

servers:
  - url: http://localhost:8081/api/wms
    description: Servidor Local de Desarrollo (Puerto 8081)

paths:
  /lpn:
    post:
      tags:
        - WMS
      operationId: registrarEtiquetadoLPN
      summary: Generar etiqueta LPN
      description: Crea o ejecuta una nueva operación del módulo EtiquetadoLPN.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EtiquetadoLPNRequest'
            example:
              id_pallet: "PALLET-000987"
              tipo_pallet: "despacho"
              id_almacen: "ALM_LIMA"
      responses:
        '201':
          description: Operación registrada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EtiquetadoLPNResponseExito'
              example:
                ok: true
                codigo_lpn: "LPN-2026-000458"
                id_pallet: "PALLET-000987"
                mensaje: "Código LPN generado correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EtiquetadoLPNResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "El identificador del pallet no cumple con el formato requerido."
        '409':
          description: Conflicto o duplicado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EtiquetadoLPNResponseError409'
              example:
                ok: false
                error: "LPN_YA_EXISTENTE"
                detalle: "El pallet ya tiene un código LPN asignado."

  /lpn/{id_lpn}:
    get:
      tags:
        - WMS
      operationId: consultarEtiquetadoLPN
      summary: Consultar registro
      description: Consulta el resultado de una operación previamente registrada.
      parameters:
        - name: id_lpn
          in: path
          required: true
          description: Identificador del registro a consultar.
          schema:
            type: string
            maxLength: 50
            example: "LPN-2026-000458"
      responses:
        '200':
          description: Consulta realizada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EtiquetadoLPNResponseConsultaExito'
              example:
                ok: true
                id_lpn: "LPN-2026-000458"
                estado: "registrado"
                mensaje: "Consulta realizada correctamente"
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EtiquetadoLPNResponseError404'
              example:
                ok: false
                error: "RECURSO_NO_ENCONTRADO"
                detalle: "No se encontró el registro solicitado."

    put:
      tags:
        - WMS
      operationId: actualizarEtiquetadoLPN
      summary: Actualizar registro
      description: Actualiza o corrige el estado de un registro existente.
      parameters:
        - name: id_lpn
          in: path
          required: true
          description: Identificador del registro a actualizar.
          schema:
            type: string
            maxLength: 50
            example: "LPN-2026-000458"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EtiquetadoLPNRequestActualizar'
      responses:
        '200':
          description: Registro actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EtiquetadoLPNResponseActualizarExito'
              example:
                ok: true
                id_lpn: "LPN-2026-000458"
                estado: "actualizado"
                mensaje: "Registro actualizado correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EtiquetadoLPNResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "El identificador del pallet no cumple con el formato requerido."
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EtiquetadoLPNResponseError404'
              example:
                ok: false
                error: "RECURSO_NO_ENCONTRADO"
                detalle: "No se encontró el registro solicitado."

    delete:
      tags:
        - WMS
      operationId: anularEtiquetadoLPN
      summary: Anular registro
      description: Anula o cancela un registro previamente creado.
      parameters:
        - name: id_lpn
          in: path
          required: true
          description: Identificador del registro a anular.
          schema:
            type: string
            maxLength: 50
            example: "LPN-2026-000458"
      responses:
        '200':
          description: Registro anulado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EtiquetadoLPNResponseAnularExito'
              example:
                ok: true
                id_lpn: "LPN-2026-000458"
                estado: "anulado"
                mensaje: "Registro anulado correctamente"
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EtiquetadoLPNResponseError404'
              example:
                ok: false
                error: "RECURSO_NO_ENCONTRADO"
                detalle: "No se encontró el registro solicitado."
        '409':
          description: El registro no puede anularse
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EtiquetadoLPNResponseError409'
              example:
                ok: false
                error: "LPN_YA_EXISTENTE"
                detalle: "El pallet ya tiene un código LPN asignado."

components:
  schemas:
    EtiquetadoLPNRequest:
      type: object
      required:
        - id_pallet
        - id_almacen
      properties:
        id_pallet:
          type: string
          maxLength: 50
          description: "Código único del pallet al que se asignará el LPN."
          example: "PALLET-000987"
        tipo_pallet:
          type: string
          maxLength: 30
          description: "Clasificación logística del pallet."
          example: "despacho"
        id_almacen:
          type: string
          maxLength: 20
          description: "Código del almacén donde se encuentra el pallet."
          example: "ALM_LIMA"

    EtiquetadoLPNRequestActualizar:
      type: object
      required:
        - estado
      properties:
        estado:
          type: string
          maxLength: 30
          description: "Nuevo estado del registro."
          example: "actualizado"
        observacion:
          type: string
          maxLength: 250
          description: "Comentario asociado a la actualización."
          example: "Actualización registrada correctamente."

    EtiquetadoLPNResponseExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        codigo_lpn:
          type: string
          maxLength: 50
          example: "LPN-2026-000458"
        id_pallet:
          type: string
          maxLength: 50
          example: "PALLET-000987"
        mensaje:
          type: string
          example: "Código LPN generado correctamente"

    EtiquetadoLPNResponseConsultaExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_lpn:
          type: string
          maxLength: 50
          example: "LPN-2026-000458"
        estado:
          type: string
          maxLength: 30
          example: "registrado"
        mensaje:
          type: string
          example: "Consulta realizada correctamente"

    EtiquetadoLPNResponseActualizarExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_lpn:
          type: string
          maxLength: 50
          example: "LPN-2026-000458"
        estado:
          type: string
          maxLength: 30
          example: "actualizado"
        mensaje:
          type: string
          example: "Registro actualizado correctamente"

    EtiquetadoLPNResponseAnularExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_lpn:
          type: string
          maxLength: 50
          example: "LPN-2026-000458"
        estado:
          type: string
          maxLength: 30
          example: "anulado"
        mensaje:
          type: string
          example: "Registro anulado correctamente"

    EtiquetadoLPNResponseError400:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "DATOS_INVALIDOS"
        detalle:
          type: string
          maxLength: 250
          example: "El identificador del pallet no cumple con el formato requerido."

    EtiquetadoLPNResponseError404:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "RECURSO_NO_ENCONTRADO"
        detalle:
          type: string
          maxLength: 250
          example: "No se encontró el registro solicitado."

    EtiquetadoLPNResponseError409:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "LPN_YA_EXISTENTE"
        detalle:
          type: string
          maxLength: 250
          example: "El pallet ya tiene un código LPN asignado."
