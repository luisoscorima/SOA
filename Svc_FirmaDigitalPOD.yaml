openapi: 3.0.0

info:
  title: Svc_FirmaDigitalPOD - API de App
  description: |
    Servicio encargado de registrar la firma digital como prueba de entrega (POD), generando evidencia asociada a la entrega realizada.

    ---

    **Información Técnica del Servicio:**

    * **Protocolo:** REST / HTTPS / JSON

    * **Puerto del protocolo:** 8081 (Entorno Local)

    * **Tipo de servicio:** Utilidad

    * **Justificación SOA:** Composibilidad, ya que puede integrarse en múltiples procesos de entrega, confirmación y auditoría.

    ---
  version: 1.0.0

servers:
  - url: http://localhost:8081/api/app
    description: Servidor Local de Desarrollo (Puerto 8081)

paths:
  /pod/firmas:
    post:
      tags:
        - App
      operationId: registrarFirmaDigitalPOD
      summary: Registrar firma digital POD
      description: Crea o ejecuta una nueva operación del módulo FirmaDigitalPOD.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FirmaDigitalPODRequest'
            example:
              id_entrega: "ENT-000125"
              id_cliente: 150
              nombre_receptor: "Luis Pérez"
              documento_receptor: "45678912"
              firma_base64: "iVBORw0KGgoAAAANSUhEUgAA..."
      responses:
        '201':
          description: Registro creado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FirmaDigitalPODResponseExito'
              example:
                ok: true
                id_evidencia: "POD-000321"
                estado: "registrado"
                mensaje: "Firma digital POD registrada correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FirmaDigitalPODResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "La información de firma digital es inválida o incompleta."
        '409':
          description: Conflicto o duplicado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FirmaDigitalPODResponseError409'
              example:
                ok: false
                error: "EVIDENCIA_YA_REGISTRADA"
                detalle: "La entrega enviada ya cuenta con una evidencia POD registrada."

  /pod/firmas/{id_firma}:
    get:
      tags:
        - App
      operationId: consultarFirmaDigitalPOD
      summary: Consultar registro
      description: Consulta el resultado de una operación previamente registrada.
      parameters:
        - name: id_firma
          in: path
          required: true
          description: Identificador del registro a consultar.
          schema:
            type: string
            maxLength: 50
            example: "POD-000321"
      responses:
        '200':
          description: Consulta realizada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FirmaDigitalPODResponseConsultaExito'
              example:
                ok: true
                id_firma: "POD-000321"
                estado: "registrado"
                mensaje: "Consulta realizada correctamente"
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FirmaDigitalPODResponseError404'
              example:
                ok: false
                error: "RECURSO_NO_ENCONTRADO"
                detalle: "No se encontró el registro solicitado."

    put:
      tags:
        - App
      operationId: actualizarFirmaDigitalPOD
      summary: Actualizar registro
      description: "Actualiza o corrige el estado de un registro existente. Para anular, envíe estado anulado."
      parameters:
        - name: id_firma
          in: path
          required: true
          description: Identificador del registro a actualizar.
          schema:
            type: string
            maxLength: 50
            example: "POD-000321"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FirmaDigitalPODRequestActualizar'
      responses:
        '200':
          description: Registro actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FirmaDigitalPODResponseActualizarExito'
              example:
                ok: true
                id_firma: "POD-000321"
                estado: "actualizado"
                mensaje: "Registro actualizado correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FirmaDigitalPODResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "La información de firma digital es inválida o incompleta."
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FirmaDigitalPODResponseError404'
              example:
                ok: false
                error: "RECURSO_NO_ENCONTRADO"
                detalle: "No se encontró el registro solicitado."

components:
  schemas:
    FirmaDigitalPODRequest:
      type: object
      required:
        - id_entrega
        - nombre_receptor
        - firma_base64
      properties:
        id_entrega:
          type: string
          maxLength: 50
          description: "Código único de la entrega asociada a la firma digital."
          example: "ENT-000125"
        id_cliente:
          type: integer
          description: "Identificador del cliente asociado a la entrega."
          example: 150
        nombre_receptor:
          type: string
          maxLength: 150
          description: "Nombre completo de la persona que recibe el pedido."
          example: "Luis Pérez"
        documento_receptor:
          type: string
          maxLength: 20
          description: "Documento de identidad de la persona receptora."
          example: "45678912"
        firma_base64:
          type: string
          description: "Imagen de la firma digital codificada en Base64."
          example: "iVBORw0KGgoAAAANSUhEUgAA..."

    FirmaDigitalPODRequestActualizar:
      type: object
      required:
        - estado
      properties:
        estado:
          type: string
          maxLength: 30
          description: "Nuevo estado del registro. Use \"anulado\" para cancelar sin eliminar."
          example: "actualizado"
        observacion:
          type: string
          maxLength: 250
          description: "Comentario asociado a la actualización."
          example: "Actualización registrada correctamente."

    FirmaDigitalPODResponseExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_evidencia:
          type: string
          maxLength: 50
          example: "POD-000321"
        estado:
          type: string
          maxLength: 30
          example: "registrado"
        mensaje:
          type: string
          example: "Firma digital POD registrada correctamente"

    FirmaDigitalPODResponseConsultaExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_firma:
          type: string
          maxLength: 50
          example: "POD-000321"
        estado:
          type: string
          maxLength: 30
          example: "registrado"
        mensaje:
          type: string
          example: "Consulta realizada correctamente"

    FirmaDigitalPODResponseActualizarExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_firma:
          type: string
          maxLength: 50
          example: "POD-000321"
        estado:
          type: string
          maxLength: 30
          example: "actualizado"
        mensaje:
          type: string
          example: "Registro actualizado correctamente"

    FirmaDigitalPODResponseError400:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "DATOS_INVALIDOS"
        detalle:
          type: string
          maxLength: 250
          example: "La información de firma digital es inválida o incompleta."

    FirmaDigitalPODResponseError404:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "RECURSO_NO_ENCONTRADO"
        detalle:
          type: string
          maxLength: 250
          example: "No se encontró el registro solicitado."

    FirmaDigitalPODResponseError409:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "EVIDENCIA_YA_REGISTRADA"
        detalle:
          type: string
          maxLength: 250
          example: "La entrega enviada ya cuenta con una evidencia POD registrada."
