openapi: 3.0.0

info:
  title: Svc_GeneracionPicking - API de WMS
  description: |
    Servicio encargado de generar listas de picking a partir de pedidos registrados en el WMS, centralizando la lógica de preparación de productos para despacho.

    ---

    **Información Técnica del Servicio:**

    * **Protocolo:** REST / HTTPS / JSON

    * **Puerto del protocolo:** 8081 (Entorno Local)

    * **Tipo de servicio:** Tarea

    * **Justificación SOA:** Encapsulación de la lógica de generación de listas de picking.

    ---
  version: 1.0.0

servers:
  - url: http://localhost:8081/api/wms
    description: Servidor Local de Desarrollo (Puerto 8081)

paths:
  /picking:
    post:
      tags:
        - WMS
      operationId: registrarGeneracionPicking
      summary: Generar lista de picking
      description: Crea o ejecuta una nueva operación del módulo GeneracionPicking.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GeneracionPickingRequest'
            example:
              id_pedido: "PED-000125"
              id_almacen: "ALM_LIMA"
              prioridad: "alta"
      responses:
        '201':
          description: Registro creado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneracionPickingResponseExito'
              example:
                ok: true
                id_lista_picking: "PICK-000789"
                id_pedido: "PED-000125"
                mensaje: "Lista de picking generada correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneracionPickingResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "El identificador del pedido o almacén no cumple con el formato requerido."
        '409':
          description: Conflicto o duplicado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneracionPickingResponseError409'
              example:
                ok: false
                error: "CONFLICTO"
                detalle: "El registro ya existe o presenta un conflicto operativo."

  /p
  /picking/{id_lista_picking}:
    get:
      tags:
        - WMS
      operationId: consultarGeneracionPicking
      summary: Consultar registro
      description: Consulta el resultado de una operación previamente registrada.
      parameters:
        - name: id_lista_picking
          in: path
          required: true
          description: Identificador del registro a consultar.
          schema:
            type: string
            maxLength: 50
            example: "PICK-000789"
      responses:
        '200':
          description: Consulta realizada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneracionPickingResponseConsultaExito'
              example:
                ok: true
                id_lista_picking: "PICK-000789"
                estado: "registrado"
                mensaje: "Consulta realizada correctamente"
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneracionPickingResponseError404'
              example:
                ok: false
                error: "PEDIDO_NO_ENCONTRADO"
                detalle: "No existe un pedido registrado con el identificador enviado."

    put:
      tags:
        - WMS
      operationId: actualizarGeneracionPicking
      summary: Actualizar registro
      description: Actualiza o corrige el estado de un registro existente.
      parameters:
        - name: id_lista_picking
          in: path
          required: true
          description: Identificador del registro a actualizar.
          schema:
            type: string
            maxLength: 50
            example: "PICK-000789"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GeneracionPickingRequestActualizar'
      responses:
        '200':
          description: Registro actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneracionPickingResponseActualizarExito'
              example:
                ok: true
                id_lista_picking: "PICK-000789"
                estado: "actualizado"
                mensaje: "Registro actualizado correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneracionPickingResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "El identificador del pedido o almacén no cumple con el formato requerido."
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneracionPickingResponseError404'
              example:
                ok: false
                error: "PEDIDO_NO_ENCONTRADO"
                detalle: "No existe un pedido registrado con el identificador enviado."

    delete:
      tags:
        - WMS
      operationId: anularGeneracionPicking
      summary: Anular registro
      description: Anula o cancela un registro previamente creado.
      parameters:
        - name: id_lista_picking
          in: path
          required: true
          description: Identificador del registro a anular.
          schema:
            type: string
            maxLength: 50
            example: "PICK-000789"
      responses:
        '200':
          description: Registro anulado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneracionPickingResponseAnularExito'
              example:
                ok: true
                id_lista_picking: "PICK-000789"
                estado: "anulado"
                mensaje: "Registro anulado correctamente"
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneracionPickingResponseError404'
              example:
                ok: false
                error: "PEDIDO_NO_ENCONTRADO"
                detalle: "No existe un pedido registrado con el identificador enviado."
        '409':
          description: El registro no puede anularse
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneracionPickingResponseError409'
              example:
                ok: false
                error: "CONFLICTO"
                detalle: "El registro ya existe o presenta un conflicto operativo."

components:
  schemas:
    GeneracionPickingRequest:
      type: object
      required:
        - id_pedido
        - id_almacen
      properties:
        id_pedido:
          type: string
          maxLength: 50
          description: "Código único del pedido para el cual se generará la lista de picking."
          example: "PED-000125"
        id_almacen:
          type: string
          maxLength: 20
          description: "Código del almacén desde donde se preparará el pedido."
          example: "ALM_LIMA"
        prioridad:
          type: string
          maxLength: 20
          description: "Nivel de prioridad asignado al pedido."
          example: "alta"

    GeneracionPickingRequestActualizar:
      type: object
      required:
        - estado
      properties:
        estado:
          type: string
          maxLength: 30
          description: "Nuevo estado del registro."
          example: "actualizado"
        observacion:
          type: string
          maxLength: 250
          description: "Comentario asociado a la actualización."
          example: "Actualización registrada correctamente."

    GeneracionPickingResponseExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_lista_picking:
          type: string
          maxLength: 50
          example: "PICK-000789"
        id_pedido:
          type: string
          maxLength: 50
          example: "PED-000125"
        items:
          type: array
          description: "Detalle de productos incluidos en la lista de picking."
          items:
            type: object
            properties:
              id_producto:
                type: string
                maxLength: 50
                example: "SKU_IK_1.5L"
              cantidad:
                type: integer
                example: 120
              ubicacion:
                type: string
                maxLength: 50
                example: "PASILLO-03-NIVEL-02"
        mensaje:
          type: string
          example: "Lista de picking generada correctamente"

    GeneracionPickingResponseConsultaExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_lista_picking:
          type: string
          maxLength: 50
          example: "PICK-000789"
        estado:
          type: string
          maxLength: 30
          example: "registrado"
        mensaje:
          type: string
          example: "Consulta realizada correctamente"

    GeneracionPickingResponseActualizarExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_lista_picking:
          type: string
          maxLength: 50
          example: "PICK-000789"
        estado:
          type: string
          maxLength: 30
          example: "actualizado"
        mensaje:
          type: string
          example: "Registro actualizado correctamente"

    GeneracionPickingResponseAnularExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_lista_picking:
          type: string
          maxLength: 50
          example: "PICK-000789"
        estado:
          type: string
          maxLength: 30
          example: "anulado"
        mensaje:
          type: string
          example: "Registro anulado correctamente"

    GeneracionPickingResponseError400:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "DATOS_INVALIDOS"
        detalle:
          type: string
          maxLength: 250
          example: "El identificador del pedido o almacén no cumple con el formato requerido."

    GeneracionPickingResponseError404:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "PEDIDO_NO_ENCONTRADO"
        detalle:
          type: string
          maxLength: 250
          example: "No existe un pedido registrado con el identificador enviado."

    GeneracionPickingResponseError409:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "CONFLICTO"
        detalle:
          type: string
          maxLength: 250
          example: "El registro ya existe o presenta un conflicto operativo."
