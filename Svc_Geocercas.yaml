openapi: 3.0.0

info:
  title: Svc_Geocercas - API de TMS
  description: |
    Servicio encargado de gestionar geocercas para monitoreo logístico, permitiendo generar alertas automáticas cuando un vehículo entra o sale de una zona definida.

    ---

    **Información Técnica del Servicio:**

    * **Protocolo:** REST / HTTPS / JSON

    * **Puerto del protocolo:** 8081 (Entorno Local)

    * **Tipo de servicio:** Utilidad

    * **Justificación SOA:** Reusabilidad, ya que puede aplicarse a múltiples procesos de monitoreo y seguimiento logístico.

    ---
  version: 1.0.0

servers:
  - url: http://localhost:8081/api/tms
    description: Servidor Local de Desarrollo (Puerto 8081)

paths:
  /geocercas:
    get:
      tags:
        - TMS
      operationId: consultarGeocercaDirecto
      summary: Consultar geocerca (consulta rápida)
      description: Consulta directa del estado de una geocerca y su relación con un vehículo.
      parameters:
        - name: id_geocerca
          in: query
          required: true
          schema:
            type: string
            maxLength: 50
            example: "GEO-000125"
        - name: id_vehiculo
          in: query
          required: false
          schema:
            type: string
            maxLength: 50
            example: "VEH-000321"
      responses:
        '200':
          description: Geocerca consultada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeocercasResponseExito'
              example:
                ok: true
                id_geocerca: "GEO-000125"
                alerta_generada: true
                tipo_alerta: "ingreso"
                mensaje: "Geocerca consultada correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeocercasResponseError400'
              example:
                ok: false
                error: "COORDENADAS_INVALIDAS"
                detalle: "La latitud o longitud enviada se encuentra fuera del rango permitido."
        '404':
          description: Geocerca no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeocercasResponseError404'
              example:
                ok: false
                error: "GEOCERCA_NO_ENCONTRADA"
                detalle: "No existe una geocerca registrada con el identificador enviado."

  /geocercas/consultas:
    post:
      tags:
        - TMS
      operationId: registrarGeocercas
      summary: Registrar consulta de geocerca
      description: Crea o ejecuta una nueva operación del módulo Geocercas.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GeocercasRequest'
            example:
              id_vehiculo: "VEH-000321"
              latitud: -12.0464
              longitud: -77.0428
              id_geocerca: "GEO-000125"
      responses:
        '201':
          description: Operación registrada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeocercasResponseExito'
              example:
                ok: true
                id_geocerca: "GEO-000125"
                alerta_generada: true
                tipo_alerta: "ingreso"
                mensaje: "Geocerca consultada correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeocercasResponseError400'
              example:
                ok: false
                error: "COORDENADAS_INVALIDAS"
                detalle: "La latitud o longitud enviada se encuentra fuera del rango permitido."
        '409':
          description: Conflicto o duplicado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeocercasResponseError409'
              example:
                ok: false
                error: "CONFLICTO"
                detalle: "El registro ya existe o presenta un conflicto operativo."

  /geocercas/consultas/{id_consulta}:
    get:
      tags:
        - TMS
      operationId: consultarGeocercas
      summary: Consultar registro
      description: Consulta el resultado de una operación previamente registrada.
      parameters:
        - name: id_consulta
          in: path
          required: true
          description: Identificador del registro a consultar.
          schema:
            type: string
            maxLength: 50
            example: "GEOCON-000125"
      responses:
        '200':
          description: Consulta realizada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeocercasResponseConsultaExito'
              example:
                ok: true
                id_consulta: "GEOCON-000125"
                estado: "registrado"
                mensaje: "Consulta realizada correctamente"
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeocercasResponseError404'
              example:
                ok: false
                error: "GEOCERCA_NO_ENCONTRADA"
                detalle: "No existe una geocerca registrada con el identificador enviado."

    put:
      tags:
        - TMS
      operationId: actualizarGeocercas
      summary: Actualizar registro
      description: Actualiza o corrige el estado de un registro existente.
      parameters:
        - name: id_consulta
          in: path
          required: true
          description: Identificador del registro a actualizar.
          schema:
            type: string
            maxLength: 50
            example: "GEOCON-000125"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GeocercasRequestActualizar'
      responses:
        '200':
          description: Registro actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeocercasResponseActualizarExito'
              example:
                ok: true
                id_consulta: "GEOCON-000125"
                estado: "actualizado"
                mensaje: "Registro actualizado correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeocercasResponseError400'
              example:
                ok: false
                error: "COORDENADAS_INVALIDAS"
                detalle: "La latitud o longitud enviada se encuentra fuera del rango permitido."
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeocercasResponseError404'
              example:
                ok: false
                error: "GEOCERCA_NO_ENCONTRADA"
                detalle: "No existe una geocerca registrada con el identificador enviado."

components:
  schemas:
    GeocercasRequest:
      type: object
      required:
        - id_vehiculo
        - latitud
        - longitud
        - id_geocerca
      properties:
        id_vehiculo:
          type: string
          maxLength: 50
          description: "Código único del vehículo monitoreado."
          example: "VEH-000321"
        latitud:
          type: number
          format: double
          minimum: -90
          maximum: 90
          description: "Latitud actual reportada por el GPS."
          example: -12.0464
        longitud:
          type: number
          format: double
          minimum: -180
          maximum: 180
          description: "Longitud actual reportada por el GPS."
          example: -77.0428
        id_geocerca:
          type: string
          maxLength: 50
          description: "Código de la geocerca configurada."
          example: "GEO-000125"

    GeocercasRequestActualizar:
      type: object
      required:
        - estado
      properties:
        estado:
          type: string
          maxLength: 30
          description: "Nuevo estado del registro."
          example: "actualizado"
        observacion:
          type: string
          maxLength: 250
          description: "Comentario asociado a la actualización."
          example: "Actualización registrada correctamente."

    GeocercasResponseExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_geocerca:
          type: string
          maxLength: 50
          example: "GEO-000125"
        alerta_generada:
          type: boolean
          example: true
        tipo_alerta:
          type: string
          maxLength: 30
          example: "ingreso"
        mensaje:
          type: string
          example: "Geocerca consultada correctamente"

    GeocercasResponseConsultaExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_consulta:
          type: string
          maxLength: 50
          example: "GEOCON-000125"
        estado:
          type: string
          maxLength: 30
          example: "registrado"
        mensaje:
          type: string
          example: "Consulta realizada correctamente"

    GeocercasResponseActualizarExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_consulta:
          type: string
          maxLength: 50
          example: "GEOCON-000125"
        estado:
          type: string
          maxLength: 30
          example: "actualizado"
        mensaje:
          type: string
          example: "Registro actualizado correctamente"

    GeocercasResponseError400:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "COORDENADAS_INVALIDAS"
        detalle:
          type: string
          maxLength: 250
          example: "La latitud o longitud enviada se encuentra fuera del rango permitido."

    GeocercasResponseError404:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "GEOCERCA_NO_ENCONTRADA"
        detalle:
          type: string
          maxLength: 250
          example: "No existe una geocerca registrada con el identificador enviado."

    GeocercasResponseError409:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "CONFLICTO"
        detalle:
          type: string
          maxLength: 250
          example: "El registro ya existe o presenta un conflicto operativo."
