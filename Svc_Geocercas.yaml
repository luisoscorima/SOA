openapi: 3.0.0

info:
  title: Svc_Geocercas - API de TMS
  description: |
    Servicio encargado de gestionar geocercas para monitoreo logístico, permitiendo generar alertas automáticas cuando un vehículo entra o sale de una zona definida.

    ---

    **Información Técnica del Servicio:**

    * **Protocolo:** REST / HTTPS / JSON

    * **Puerto del protocolo:** 8081 (Entorno Local)

    * **Tipo de servicio:** Utilidad

    * **Justificación SOA:** Reusabilidad, ya que puede aplicarse a múltiples procesos de monitoreo y seguimiento logístico.

    ---
  version: 1.0.0

servers:
  - url: http://localhost:8081/api/tms
    description: Servidor Local de Desarrollo (Puerto 8081)

paths:
  /geocercas/monitorear:
    post:
      summary: Monitorear geocerca
      description: Evalúa la ubicación de un vehículo respecto a una geocerca configurada y genera alertas de ingreso o salida.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GeocercasRequest'
            example:
              id_vehiculo: "VEH-000321"
              latitud: -12.0464
              longitud: -77.0428
              id_geocerca: "GEO-000125"
      responses:
        '200':
          description: Monitoreo de geocerca procesado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeocercasResponseExito'
        '400':
          description: Datos de ubicación inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeocercasResponseError400'
        '404':
          description: Geocerca no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeocercasResponseError404'

components:
  schemas:
    GeocercasRequest:
      type: object
      required:
        - id_vehiculo
        - latitud
        - longitud
        - id_geocerca
      properties:
        id_vehiculo:
          type: string
          maxLength: 50
          description: "Código único del vehículo monitoreado."
          example: "VEH-000321"
        latitud:
          type: number
          format: double
          minimum: -90
          maximum: 90
          description: "Latitud actual reportada por el GPS."
          example: -12.0464
        longitud:
          type: number
          format: double
          minimum: -180
          maximum: 180
          description: "Longitud actual reportada por el GPS."
          example: -77.0428
        id_geocerca:
          type: string
          maxLength: 50
          description: "Código de la geocerca configurada."
          example: "GEO-000125"

    GeocercasResponseExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        alerta_generada:
          type: boolean
          example: true
        tipo_alerta:
          type: string
          maxLength: 30
          example: "ingreso"
        mensaje:
          type: string
          example: "Vehículo ingresó a la geocerca configurada"

    GeocercasResponseError400:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "COORDENADAS_INVALIDAS"
        detalle:
          type: string
          maxLength: 250
          example: "La latitud o longitud enviada se encuentra fuera del rango permitido."

    GeocercasResponseError404:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "GEOCERCA_NO_ENCONTRADA"
        detalle:
          type: string
          maxLength: 250
          example: "No existe una geocerca registrada con el identificador enviado."