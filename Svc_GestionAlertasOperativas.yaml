openapi: 3.0.0

info:
  title: Svc_GestionAlertasOperativas - API de TMS
  description: |
    Servicio encargado de gestionar alertas operativas generadas durante los procesos logísticos y de transporte, permitiendo desacoplar el monitoreo y las incidencias del flujo principal.

    ---

    **Información Técnica del Servicio:**

    * **Protocolo:** REST / HTTPS / JSON

    * **Puerto del protocolo:** 8081 (Entorno Local)

    * **Tipo de servicio:** Utilidad

    * **Justificación SOA:** Desacopla el monitoreo y la gestión de incidencias del flujo principal de operación.

    ---
  version: 1.0.0

servers:
  - url: http://localhost:8081/api/tms
    description: Servidor Local de Desarrollo (Puerto 8081)

paths:
  /alertas/operativas:
    post:
      tags:
        - TMS
      operationId: registrarGestionAlertasOperativas
      summary: Registrar alerta operativa
      description: Crea o ejecuta una nueva operación del módulo GestionAlertasOperativas.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GestionAlertasOperativasRequest'
            example:
              id_evento: "EVT-000789"
              tipo_alerta: "retraso_ruta"
              severidad: "alta"
              id_ruta: "RUTA-000789"
              descripcion: "Se detectó retraso superior a 30 minutos."
      responses:
        '201':
          description: Operación registrada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GestionAlertasOperativasResponseExito'
              example:
                ok: true
                id_alerta: "ALT-000321"
                estado: "generada"
                mensaje: "Alerta operativa generada correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GestionAlertasOperativasResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "La información de la alerta operativa es inválida o incompleta."
        '409':
          description: Conflicto o duplicado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GestionAlertasOperativasResponseError409'
              example:
                ok: false
                error: "ALERTA_YA_REGISTRADA"
                detalle: "El evento enviado ya cuenta con una alerta operativa registrada."

  /alertas/operativas/{id_alerta}:
    get:
      tags:
        - TMS
      operationId: consultarGestionAlertasOperativas
      summary: Consultar registro
      description: Consulta el resultado de una operación previamente registrada.
      parameters:
        - name: id_alerta
          in: path
          required: true
          description: Identificador del registro a consultar.
          schema:
            type: string
            maxLength: 50
            example: "ALR-000321"
      responses:
        '200':
          description: Consulta realizada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GestionAlertasOperativasResponseConsultaExito'
              example:
                ok: true
                id_alerta: "ALR-000321"
                estado: "registrado"
                mensaje: "Consulta realizada correctamente"
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GestionAlertasOperativasResponseError404'
              example:
                ok: false
                error: "RECURSO_NO_ENCONTRADO"
                detalle: "No se encontró el registro solicitado."

    put:
      tags:
        - TMS
      operationId: actualizarGestionAlertasOperativas
      summary: Actualizar registro
      description: Actualiza o corrige el estado de un registro existente.
      parameters:
        - name: id_alerta
          in: path
          required: true
          description: Identificador del registro a actualizar.
          schema:
            type: string
            maxLength: 50
            example: "ALR-000321"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GestionAlertasOperativasRequestActualizar'
      responses:
        '200':
          description: Registro actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GestionAlertasOperativasResponseActualizarExito'
              example:
                ok: true
                id_alerta: "ALR-000321"
                estado: "actualizado"
                mensaje: "Registro actualizado correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GestionAlertasOperativasResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "La información de la alerta operativa es inválida o incompleta."
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GestionAlertasOperativasResponseError404'
              example:
                ok: false
                error: "RECURSO_NO_ENCONTRADO"
                detalle: "No se encontró el registro solicitado."

    delete:
      tags:
        - TMS
      operationId: anularGestionAlertasOperativas
      summary: Anular registro
      description: Anula o cancela un registro previamente creado.
      parameters:
        - name: id_alerta
          in: path
          required: true
          description: Identificador del registro a anular.
          schema:
            type: string
            maxLength: 50
            example: "ALR-000321"
      responses:
        '200':
          description: Registro anulado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GestionAlertasOperativasResponseAnularExito'
              example:
                ok: true
                id_alerta: "ALR-000321"
                estado: "anulado"
                mensaje: "Registro anulado correctamente"
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GestionAlertasOperativasResponseError404'
              example:
                ok: false
                error: "RECURSO_NO_ENCONTRADO"
                detalle: "No se encontró el registro solicitado."
        '409':
          description: El registro no puede anularse
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GestionAlertasOperativasResponseError409'
              example:
                ok: false
                error: "ALERTA_YA_REGISTRADA"
                detalle: "El evento enviado ya cuenta con una alerta operativa registrada."

components:
  schemas:
    GestionAlertasOperativasRequest:
      type: object
      required:
        - id_evento
        - tipo_alerta
        - severidad
      properties:
        id_evento:
          type: string
          maxLength: 50
          description: "Código único del evento que genera la alerta."
          example: "EVT-000789"
        tipo_alerta:
          type: string
          maxLength: 50
          description: "Clasificación de la alerta operativa generada."
          example: "retraso_ruta"
        severidad:
          type: string
          maxLength: 20
          description: "Nivel de severidad de la alerta."
          example: "alta"
        id_ruta:
          type: string
          maxLength: 50
          description: "Código de la ruta asociada a la alerta."
          example: "RUTA-000789"
        descripcion:
          type: string
          maxLength: 250
          description: "Detalle descriptivo de la alerta operativa."
          example: "Se detectó retraso superior a 30 minutos."

    GestionAlertasOperativasRequestActualizar:
      type: object
      required:
        - estado
      properties:
        estado:
          type: string
          maxLength: 30
          description: "Nuevo estado del registro."
          example: "actualizado"
        observacion:
          type: string
          maxLength: 250
          description: "Comentario asociado a la actualización."
          example: "Actualización registrada correctamente."

    GestionAlertasOperativasResponseExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_alerta:
          type: string
          maxLength: 50
          example: "ALT-000321"
        estado:
          type: string
          maxLength: 30
          example: "generada"
        mensaje:
          type: string
          example: "Alerta operativa generada correctamente"

    GestionAlertasOperativasResponseConsultaExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_alerta:
          type: string
          maxLength: 50
          example: "ALR-000321"
        estado:
          type: string
          maxLength: 30
          example: "registrado"
        mensaje:
          type: string
          example: "Consulta realizada correctamente"

    GestionAlertasOperativasResponseActualizarExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_alerta:
          type: string
          maxLength: 50
          example: "ALR-000321"
        estado:
          type: string
          maxLength: 30
          example: "actualizado"
        mensaje:
          type: string
          example: "Registro actualizado correctamente"

    GestionAlertasOperativasResponseAnularExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_alerta:
          type: string
          maxLength: 50
          example: "ALR-000321"
        estado:
          type: string
          maxLength: 30
          example: "anulado"
        mensaje:
          type: string
          example: "Registro anulado correctamente"

    GestionAlertasOperativasResponseError400:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "DATOS_INVALIDOS"
        detalle:
          type: string
          maxLength: 250
          example: "La información de la alerta operativa es inválida o incompleta."

    GestionAlertasOperativasResponseError404:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "RECURSO_NO_ENCONTRADO"
        detalle:
          type: string
          maxLength: 250
          example: "No se encontró el registro solicitado."

    GestionAlertasOperativasResponseError409:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "ALERTA_YA_REGISTRADA"
        detalle:
          type: string
          maxLength: 250
          example: "El evento enviado ya cuenta con una alerta operativa registrada."
