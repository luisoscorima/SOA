openapi: 3.0.0

info:
  title: Svc_GestionDevoluciones - API de Logística
  description: |
    Servicio encargado de gestionar devoluciones dentro del proceso logístico, registrando productos devueltos, motivos e incidencias asociadas a la logística inversa.

    ---

    **Información Técnica del Servicio:**

    * **Protocolo:** REST / HTTPS / JSON

    * **Puerto del protocolo:** 8081 (Entorno Local)

    * **Tipo de servicio:** Tarea

    * **Justificación SOA:** Encapsula procesos de logística inversa y atención de incidencias.

    ---
  version: 1.0.0

servers:
  - url: http://localhost:8081/api/logistica
    description: Servidor Local de Desarrollo (Puerto 8081)

paths:
  /devoluciones:
    post:
      tags:
        - Logística
      operationId: registrarGestionDevoluciones
      summary: Registrar devolución
      description: Crea o ejecuta una nueva operación del módulo GestionDevoluciones.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GestionDevolucionesRequest'
            example:
              id_pedido: "PED-000125"
              id_entrega: "ENT-000125"
              id_cliente: 150
              motivo_devolucion: "producto_dañado"
      responses:
        '201':
          description: Registro creado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GestionDevolucionesResponseExito'
              example:
                ok: true
                id_devolucion: "DEV-000321"
                estado: "registrada"
                mensaje: "Devolución registrada correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GestionDevolucionesResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "La información de devolución enviada es inválida o incompleta."
        '409':
          description: Conflicto o duplicado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GestionDevolucionesResponseError409'
              example:
                ok: false
                error: "DEVOLUCION_YA_REGISTRADA"
                detalle: "El pedido enviado ya cuenta con una devolución registrada previamente."

  /devoluciones/{id_devolucion}:
    get:
      tags:
        - Logística
      operationId: consultarGestionDevoluciones
      summary: Consultar registro
      description: Consulta el resultado de una operación previamente registrada.
      parameters:
        - name: id_devolucion
          in: path
          required: true
          description: Identificador del registro a consultar.
          schema:
            type: string
            maxLength: 50
            example: "DEV-000321"
      responses:
        '200':
          description: Consulta realizada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GestionDevolucionesResponseConsultaExito'
              example:
                ok: true
                id_devolucion: "DEV-000321"
                estado: "registrado"
                mensaje: "Consulta realizada correctamente"
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GestionDevolucionesResponseError404'
              example:
                ok: false
                error: "RECURSO_NO_ENCONTRADO"
                detalle: "No se encontró el registro solicitado."

    put:
      tags:
        - Logística
      operationId: actualizarGestionDevoluciones
      summary: Actualizar registro
      description: "Actualiza o corrige el estado de un registro existente. Para anular, envíe estado anulado."
      parameters:
        - name: id_devolucion
          in: path
          required: true
          description: Identificador del registro a actualizar.
          schema:
            type: string
            maxLength: 50
            example: "DEV-000321"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GestionDevolucionesRequestActualizar'
      responses:
        '200':
          description: Registro actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GestionDevolucionesResponseActualizarExito'
              example:
                ok: true
                id_devolucion: "DEV-000321"
                estado: "actualizado"
                mensaje: "Registro actualizado correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GestionDevolucionesResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "La información de devolución enviada es inválida o incompleta."
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GestionDevolucionesResponseError404'
              example:
                ok: false
                error: "RECURSO_NO_ENCONTRADO"
                detalle: "No se encontró el registro solicitado."

components:
  schemas:
    GestionDevolucionesRequest:
      type: object
      required:
        - id_pedido
        - motivo_devolucion
        - productos
      properties:
        id_pedido:
          type: string
          maxLength: 50
          description: "Código único del pedido asociado a la devolución."
          example: "PED-000125"
        id_entrega:
          type: string
          maxLength: 50
          description: "Código de la entrega donde se originó la devolución."
          example: "ENT-000125"
        id_cliente:
          type: integer
          description: "Identificador del cliente que realiza la devolución."
          example: 150
        motivo_devolucion:
          type: string
          maxLength: 100
          description: "Motivo principal de la devolución registrada."
          example: "producto_dañado"
        productos:
          type: array
          description: "Listado de productos devueltos."
          items:
            type: object
            properties:
              id_producto:
                type: string
                maxLength: 50
                example: "SKU_IK_1.5L"
              cantidad_devuelta:
                type: integer
                minimum: 1
                example: 10
              estado_producto:
                type: string
                maxLength: 50
                example: "dañado"

    GestionDevolucionesRequestActualizar:
      type: object
      required:
        - estado
      properties:
        estado:
          type: string
          maxLength: 30
          description: "Nuevo estado del registro. Use \"anulado\" para cancelar sin eliminar."
          example: "actualizado"
        observacion:
          type: string
          maxLength: 250
          description: "Comentario asociado a la actualización."
          example: "Actualización registrada correctamente."

    GestionDevolucionesResponseExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_devolucion:
          type: string
          maxLength: 50
          example: "DEV-000321"
        estado:
          type: string
          maxLength: 30
          example: "registrada"
        mensaje:
          type: string
          example: "Devolución registrada correctamente"

    GestionDevolucionesResponseConsultaExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_devolucion:
          type: string
          maxLength: 50
          example: "DEV-000321"
        estado:
          type: string
          maxLength: 30
          example: "registrado"
        mensaje:
          type: string
          example: "Consulta realizada correctamente"

    GestionDevolucionesResponseActualizarExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_devolucion:
          type: string
          maxLength: 50
          example: "DEV-000321"
        estado:
          type: string
          maxLength: 30
          example: "actualizado"
        mensaje:
          type: string
          example: "Registro actualizado correctamente"

    GestionDevolucionesResponseError400:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "DATOS_INVALIDOS"
        detalle:
          type: string
          maxLength: 250
          example: "La información de devolución enviada es inválida o incompleta."

    GestionDevolucionesResponseError404:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "RECURSO_NO_ENCONTRADO"
        detalle:
          type: string
          maxLength: 250
          example: "No se encontró el registro solicitado."

    GestionDevolucionesResponseError409:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "DEVOLUCION_YA_REGISTRADA"
        detalle:
          type: string
          maxLength: 250
          example: "El pedido enviado ya cuenta con una devolución registrada previamente."
