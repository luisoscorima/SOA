openapi: 3.0.0

info:
  title: Svc_GestionRetornables - API de Logística
  description: |
    Servicio encargado de gestionar el registro de envases retornables dentro del proceso logístico, permitiendo su control y trazabilidad en operaciones de logística inversa.

    ---

    **Información Técnica del Servicio:**

    * **Protocolo:** REST / HTTPS / JSON

    * **Puerto del protocolo:** 8081 (Entorno Local)

    * **Tipo de servicio:** Entidad

    * **Justificación SOA:** Reusabilidad, ya que aplica a procesos de logística inversa y control de envases retornables.

    ---
  version: 1.0.0

servers:
  - url: http://localhost:8081/api/logistica
    description: Servidor Local de Desarrollo (Puerto 8081)

paths:
  /retornables:
    post:
      tags:
        - Logística
      operationId: registrarGestionRetornables
      summary: Registrar retornable
      description: Crea o ejecuta una nueva operación del módulo GestionRetornables.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GestionRetornablesRequest'
            example:
              id_entrega: "ENT-000125"
              id_cliente: 150
      responses:
        '201':
          description: Operación registrada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GestionRetornablesResponseExito'
              example:
                ok: true
                id_registro_retornable: "RET-000321"
                cantidad_envases: 24
                mensaje: "Envases retornables registrados correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GestionRetornablesResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "La información de envases retornables es inválida o incompleta."
        '409':
          description: Conflicto o duplicado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GestionRetornablesResponseError409'
              example:
                ok: false
                error: "RETORNABLES_YA_REGISTRADOS"
                detalle: "Los envases retornables asociados a esta entrega ya fueron registrados previamente."

  /retornables/{id_retornable}:
    get:
      tags:
        - Logística
      operationId: consultarGestionRetornables
      summary: Consultar registro
      description: Consulta el resultado de una operación previamente registrada.
      parameters:
        - name: id_retornable
          in: path
          required: true
          description: Identificador del registro a consultar.
          schema:
            type: string
            maxLength: 50
            example: "RET-000321"
      responses:
        '200':
          description: Consulta realizada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GestionRetornablesResponseConsultaExito'
              example:
                ok: true
                id_retornable: "RET-000321"
                estado: "registrado"
                mensaje: "Consulta realizada correctamente"
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GestionRetornablesResponseError404'
              example:
                ok: false
                error: "RECURSO_NO_ENCONTRADO"
                detalle: "No se encontró el registro solicitado."

    put:
      tags:
        - Logística
      operationId: actualizarGestionRetornables
      summary: Actualizar registro
      description: Actualiza o corrige el estado de un registro existente.
      parameters:
        - name: id_retornable
          in: path
          required: true
          description: Identificador del registro a actualizar.
          schema:
            type: string
            maxLength: 50
            example: "RET-000321"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GestionRetornablesRequestActualizar'
      responses:
        '200':
          description: Registro actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GestionRetornablesResponseActualizarExito'
              example:
                ok: true
                id_retornable: "RET-000321"
                estado: "actualizado"
                mensaje: "Registro actualizado correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GestionRetornablesResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "La información de envases retornables es inválida o incompleta."
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GestionRetornablesResponseError404'
              example:
                ok: false
                error: "RECURSO_NO_ENCONTRADO"
                detalle: "No se encontró el registro solicitado."

    delete:
      tags:
        - Logística
      operationId: anularGestionRetornables
      summary: Anular registro
      description: Anula o cancela un registro previamente creado.
      parameters:
        - name: id_retornable
          in: path
          required: true
          description: Identificador del registro a anular.
          schema:
            type: string
            maxLength: 50
            example: "RET-000321"
      responses:
        '200':
          description: Registro anulado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GestionRetornablesResponseAnularExito'
              example:
                ok: true
                id_retornable: "RET-000321"
                estado: "anulado"
                mensaje: "Registro anulado correctamente"
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GestionRetornablesResponseError404'
              example:
                ok: false
                error: "RECURSO_NO_ENCONTRADO"
                detalle: "No se encontró el registro solicitado."
        '409':
          description: El registro no puede anularse
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GestionRetornablesResponseError409'
              example:
                ok: false
                error: "RETORNABLES_YA_REGISTRADOS"
                detalle: "Los envases retornables asociados a esta entrega ya fueron registrados previamente."

components:
  schemas:
    GestionRetornablesRequest:
      type: object
      required:
        - id_entrega
        - envases
      properties:
        id_entrega:
          type: string
          maxLength: 50
          description: "Código único de la entrega o devolución asociada al registro de retornables."
          example: "ENT-000125"
        id_cliente:
          type: integer
          description: "Identificador del cliente asociado a los envases retornables."
          example: 150
        envases:
          type: array
          description: "Listado de envases retornables registrados en el proceso logístico."
          items:
            type: object
            properties:
              tipo_envase:
                type: string
                maxLength: 50
                example: "botella_retornable"
              cantidad:
                type: integer
                minimum: 1
                example: 24
              estado:
                type: string
                maxLength: 30
                example: "recibido"

    GestionRetornablesRequestActualizar:
      type: object
      required:
        - estado
      properties:
        estado:
          type: string
          maxLength: 30
          description: "Nuevo estado del registro."
          example: "actualizado"
        observacion:
          type: string
          maxLength: 250
          description: "Comentario asociado a la actualización."
          example: "Actualización registrada correctamente."

    GestionRetornablesResponseExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_registro_retornable:
          type: string
          maxLength: 50
          example: "RET-000321"
        cantidad_envases:
          type: integer
          example: 24
        mensaje:
          type: string
          example: "Envases retornables registrados correctamente"

    GestionRetornablesResponseConsultaExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_retornable:
          type: string
          maxLength: 50
          example: "RET-000321"
        estado:
          type: string
          maxLength: 30
          example: "registrado"
        mensaje:
          type: string
          example: "Consulta realizada correctamente"

    GestionRetornablesResponseActualizarExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_retornable:
          type: string
          maxLength: 50
          example: "RET-000321"
        estado:
          type: string
          maxLength: 30
          example: "actualizado"
        mensaje:
          type: string
          example: "Registro actualizado correctamente"

    GestionRetornablesResponseAnularExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_retornable:
          type: string
          maxLength: 50
          example: "RET-000321"
        estado:
          type: string
          maxLength: 30
          example: "anulado"
        mensaje:
          type: string
          example: "Registro anulado correctamente"

    GestionRetornablesResponseError400:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "DATOS_INVALIDOS"
        detalle:
          type: string
          maxLength: 250
          example: "La información de envases retornables es inválida o incompleta."

    GestionRetornablesResponseError404:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "RECURSO_NO_ENCONTRADO"
        detalle:
          type: string
          maxLength: 250
          example: "No se encontró el registro solicitado."

    GestionRetornablesResponseError409:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "RETORNABLES_YA_REGISTRADOS"
        detalle:
          type: string
          maxLength: 250
          example: "Los envases retornables asociados a esta entrega ya fueron registrados previamente."
