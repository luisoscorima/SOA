openapi: 3.0.0

info:
  title: Svc_Liquidacion - API de Admin
  description: |
    Servicio encargado de generar la liquidación administrativa del proceso logístico, consolidando documentos, valores cobrados, evidencias y registros asociados a la entrega.

    ---

    **Información Técnica del Servicio:**

    * **Protocolo:** REST / HTTPS / JSON

    * **Puerto del protocolo:** 8081 (Entorno Local)

    * **Tipo de servicio:** Tarea

    * **Justificación SOA:** Encapsulación, ya que consolida documentos y valores del proceso logístico en una operación administrativa.

    ---
  version: 1.0.0

servers:
  - url: http://localhost:8081/api/admin
    description: Servidor Local de Desarrollo (Puerto 8081)

paths:
  /liquidaciones:
    post:
      tags:
        - Admin
      operationId: registrarLiquidacion
      summary: Generar liquidación
      description: Crea o ejecuta una nueva operación del módulo Liquidacion.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LiquidacionRequest'
            example:
              id_ruta: "RUTA-000789"
              id_repartidor: "REP-001"
              fecha_liquidacion: "2026-05-29"
              valores: "PEN"
      responses:
        '201':
          description: Operación registrada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LiquidacionResponseExito'
              example:
                ok: true
                id_liquidacion: "LIQ-000321"
                estado: "generada"
                mensaje: "Liquidación generada correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LiquidacionResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "La información enviada para la liquidación es inválida o incompleta."
        '409':
          description: Conflicto o duplicado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LiquidacionResponseError409'
              example:
                ok: false
                error: "LIQUIDACION_YA_GENERADA"
                detalle: "La ruta enviada ya cuenta con una liquidación generada previamente."

  /liquidaciones/{id_liquidacion}:
    get:
      tags:
        - Admin
      operationId: consultarLiquidacion
      summary: Consultar registro
      description: Consulta el resultado de una operación previamente registrada.
      parameters:
        - name: id_liquidacion
          in: path
          required: true
          description: Identificador del registro a consultar.
          schema:
            type: string
            maxLength: 50
            example: "LIQ-000321"
      responses:
        '200':
          description: Consulta realizada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LiquidacionResponseConsultaExito'
              example:
                ok: true
                id_liquidacion: "LIQ-000321"
                estado: "registrado"
                mensaje: "Consulta realizada correctamente"
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LiquidacionResponseError404'
              example:
                ok: false
                error: "RECURSO_NO_ENCONTRADO"
                detalle: "No se encontró el registro solicitado."

    put:
      tags:
        - Admin
      operationId: actualizarLiquidacion
      summary: Actualizar registro
      description: Actualiza o corrige el estado de un registro existente.
      parameters:
        - name: id_liquidacion
          in: path
          required: true
          description: Identificador del registro a actualizar.
          schema:
            type: string
            maxLength: 50
            example: "LIQ-000321"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LiquidacionRequestActualizar'
      responses:
        '200':
          description: Registro actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LiquidacionResponseActualizarExito'
              example:
                ok: true
                id_liquidacion: "LIQ-000321"
                estado: "actualizado"
                mensaje: "Registro actualizado correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LiquidacionResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "La información enviada para la liquidación es inválida o incompleta."
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LiquidacionResponseError404'
              example:
                ok: false
                error: "RECURSO_NO_ENCONTRADO"
                detalle: "No se encontró el registro solicitado."

    delete:
      tags:
        - Admin
      operationId: anularLiquidacion
      summary: Anular registro
      description: Anula o cancela un registro previamente creado.
      parameters:
        - name: id_liquidacion
          in: path
          required: true
          description: Identificador del registro a anular.
          schema:
            type: string
            maxLength: 50
            example: "LIQ-000321"
      responses:
        '200':
          description: Registro anulado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LiquidacionResponseAnularExito'
              example:
                ok: true
                id_liquidacion: "LIQ-000321"
                estado: "anulado"
                mensaje: "Registro anulado correctamente"
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LiquidacionResponseError404'
              example:
                ok: false
                error: "RECURSO_NO_ENCONTRADO"
                detalle: "No se encontró el registro solicitado."
        '409':
          description: El registro no puede anularse
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LiquidacionResponseError409'
              example:
                ok: false
                error: "LIQUIDACION_YA_GENERADA"
                detalle: "La ruta enviada ya cuenta con una liquidación generada previamente."

components:
  schemas:
    LiquidacionRequest:
      type: object
      required:
        - id_ruta
        - id_repartidor
        - fecha_liquidacion
      properties:
        id_ruta:
          type: string
          maxLength: 50
          description: "Código único de la ruta asociada a la liquidación."
          example: "RUTA-000789"
        id_repartidor:
          type: string
          maxLength: 50
          description: "Código del repartidor asociado al cierre de liquidación."
          example: "REP-001"
        fecha_liquidacion:
          type: string
          format: date
          description: "Fecha en la que se genera la liquidación administrativa."
          example: "2026-05-29"
        documentos:
          type: array
          description: "Listado de documentos asociados a la liquidación."
          items:
            type: object
            properties:
              tipo_documento:
                type: string
                maxLength: 50
                example: "factura"
              numero_documento:
                type: string
                maxLength: 50
                example: "FAC-000125"
        valores:
          type: object
          description: "Detalle de valores económicos consolidados en la liquidación."
          properties:
            monto_cobrado:
              type: number
              format: float
              minimum: 0
              example: 1250.50
            moneda:
              type: string
              maxLength: 10
              example: "PEN"

    LiquidacionRequestActualizar:
      type: object
      required:
        - estado
      properties:
        estado:
          type: string
          maxLength: 30
          description: "Nuevo estado del registro."
          example: "actualizado"
        observacion:
          type: string
          maxLength: 250
          description: "Comentario asociado a la actualización."
          example: "Actualización registrada correctamente."

    LiquidacionResponseExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_liquidacion:
          type: string
          maxLength: 50
          example: "LIQ-000321"
        estado:
          type: string
          maxLength: 30
          example: "generada"
        mensaje:
          type: string
          example: "Liquidación generada correctamente"

    LiquidacionResponseConsultaExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_liquidacion:
          type: string
          maxLength: 50
          example: "LIQ-000321"
        estado:
          type: string
          maxLength: 30
          example: "registrado"
        mensaje:
          type: string
          example: "Consulta realizada correctamente"

    LiquidacionResponseActualizarExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_liquidacion:
          type: string
          maxLength: 50
          example: "LIQ-000321"
        estado:
          type: string
          maxLength: 30
          example: "actualizado"
        mensaje:
          type: string
          example: "Registro actualizado correctamente"

    LiquidacionResponseAnularExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_liquidacion:
          type: string
          maxLength: 50
          example: "LIQ-000321"
        estado:
          type: string
          maxLength: 30
          example: "anulado"
        mensaje:
          type: string
          example: "Registro anulado correctamente"

    LiquidacionResponseError400:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "DATOS_INVALIDOS"
        detalle:
          type: string
          maxLength: 250
          example: "La información enviada para la liquidación es inválida o incompleta."

    LiquidacionResponseError404:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "RECURSO_NO_ENCONTRADO"
        detalle:
          type: string
          maxLength: 250
          example: "No se encontró el registro solicitado."

    LiquidacionResponseError409:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "LIQUIDACION_YA_GENERADA"
        detalle:
          type: string
          maxLength: 250
          example: "La ruta enviada ya cuenta con una liquidación generada previamente."
