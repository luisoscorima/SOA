openapi: 3.0.0

info:
  title: Svc_NotificacionCliente - API de Comunicación
  description: |
    Servicio encargado de enviar notificaciones al cliente sobre el estado de su pedido o despacho mediante aplicaciones móviles o SMS.

    ---

    **Información Técnica del Servicio:**

    * **Protocolo:** REST / HTTPS / JSON

    * **Puerto del protocolo:** 8081 (Entorno Local)

    * **Tipo de servicio:** Utilidad

    * **Justificación SOA:** Stateless, ya que permite escalar el envío de notificaciones para múltiples usuarios sin mantener estado de sesión.

    ---
  version: 1.0.0

servers:
  - url: http://localhost:8081/api/comunicacion
    description: Servidor Local de Desarrollo (Puerto 8081)

paths:
  /notificaciones:
    post:
      tags:
        - Comunicación
      operationId: registrarNotificacionCliente
      summary: Enviar notificación al cliente
      description: Crea o ejecuta una nueva operación del módulo NotificacionCliente.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificacionClienteRequest'
            example:
              id_pedido: "PED-000125"
              id_cliente: 150
              canal: "SMS"
              estado_pedido: "en_ruta"
              mensaje: "Su pedido se encuentra en camino."
      responses:
        '201':
          description: Operación registrada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificacionClienteResponseExito'
              example:
                ok: true
                id_notificacion: "NOTIF-000321"
                estado_envio: "enviado"
                mensaje: "Notificación enviada correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificacionClienteResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "El canal o contenido del mensaje enviado es inválido."
        '409':
          description: Conflicto o duplicado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificacionClienteResponseError409'
              example:
                ok: false
                error: "CONFLICTO"
                detalle: "El registro ya existe o presenta un conflicto operativo."

  /notificaciones/{id_notificacion}:
    get:
      tags:
        - Comunicación
      operationId: consultarNotificacionCliente
      summary: Consultar registro
      description: Consulta el resultado de una operación previamente registrada.
      parameters:
        - name: id_notificacion
          in: path
          required: true
          description: Identificador del registro a consultar.
          schema:
            type: string
            maxLength: 50
            example: "NOT-000321"
      responses:
        '200':
          description: Consulta realizada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificacionClienteResponseConsultaExito'
              example:
                ok: true
                id_notificacion: "NOT-000321"
                estado: "registrado"
                mensaje: "Consulta realizada correctamente"
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificacionClienteResponseError404'
              example:
                ok: false
                error: "CLIENTE_O_PEDIDO_NO_ENCONTRADO"
                detalle: "No se encontró el cliente o pedido asociado a la notificación."

    put:
      tags:
        - Comunicación
      operationId: actualizarNotificacionCliente
      summary: Actualizar registro
      description: Actualiza o corrige el estado de un registro existente.
      parameters:
        - name: id_notificacion
          in: path
          required: true
          description: Identificador del registro a actualizar.
          schema:
            type: string
            maxLength: 50
            example: "NOT-000321"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificacionClienteRequestActualizar'
      responses:
        '200':
          description: Registro actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificacionClienteResponseActualizarExito'
              example:
                ok: true
                id_notificacion: "NOT-000321"
                estado: "actualizado"
                mensaje: "Registro actualizado correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificacionClienteResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "El canal o contenido del mensaje enviado es inválido."
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificacionClienteResponseError404'
              example:
                ok: false
                error: "CLIENTE_O_PEDIDO_NO_ENCONTRADO"
                detalle: "No se encontró el cliente o pedido asociado a la notificación."

    delete:
      tags:
        - Comunicación
      operationId: anularNotificacionCliente
      summary: Anular registro
      description: Anula o cancela un registro previamente creado.
      parameters:
        - name: id_notificacion
          in: path
          required: true
          description: Identificador del registro a anular.
          schema:
            type: string
            maxLength: 50
            example: "NOT-000321"
      responses:
        '200':
          description: Registro anulado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificacionClienteResponseAnularExito'
              example:
                ok: true
                id_notificacion: "NOT-000321"
                estado: "anulado"
                mensaje: "Registro anulado correctamente"
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificacionClienteResponseError404'
              example:
                ok: false
                error: "CLIENTE_O_PEDIDO_NO_ENCONTRADO"
                detalle: "No se encontró el cliente o pedido asociado a la notificación."
        '409':
          description: El registro no puede anularse
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificacionClienteResponseError409'
              example:
                ok: false
                error: "CONFLICTO"
                detalle: "El registro ya existe o presenta un conflicto operativo."

components:
  schemas:
    NotificacionClienteRequest:
      type: object
      required:
        - id_pedido
        - id_cliente
        - canal
        - mensaje
      properties:
        id_pedido:
          type: string
          maxLength: 50
          description: "Código único del pedido asociado a la notificación."
          example: "PED-000125"
        id_cliente:
          type: integer
          description: "Identificador del cliente que recibirá la notificación."
          example: 150
        canal:
          type: string
          maxLength: 20
          description: "Canal de envío utilizado para la notificación."
          example: "SMS"
        estado_pedido:
          type: string
          maxLength: 50
          description: "Estado actual del pedido informado al cliente."
          example: "en_ruta"
        mensaje:
          type: string
          maxLength: 250
          description: "Contenido del mensaje enviado al cliente."
          example: "Su pedido se encuentra en camino."

    NotificacionClienteRequestActualizar:
      type: object
      required:
        - estado
      properties:
        estado:
          type: string
          maxLength: 30
          description: "Nuevo estado del registro."
          example: "actualizado"
        observacion:
          type: string
          maxLength: 250
          description: "Comentario asociado a la actualización."
          example: "Actualización registrada correctamente."

    NotificacionClienteResponseExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_notificacion:
          type: string
          maxLength: 50
          example: "NOTIF-000321"
        estado_envio:
          type: string
          maxLength: 30
          example: "enviado"
        mensaje:
          type: string
          example: "Notificación enviada correctamente"

    NotificacionClienteResponseConsultaExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_notificacion:
          type: string
          maxLength: 50
          example: "NOT-000321"
        estado:
          type: string
          maxLength: 30
          example: "registrado"
        mensaje:
          type: string
          example: "Consulta realizada correctamente"

    NotificacionClienteResponseActualizarExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_notificacion:
          type: string
          maxLength: 50
          example: "NOT-000321"
        estado:
          type: string
          maxLength: 30
          example: "actualizado"
        mensaje:
          type: string
          example: "Registro actualizado correctamente"

    NotificacionClienteResponseAnularExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_notificacion:
          type: string
          maxLength: 50
          example: "NOT-000321"
        estado:
          type: string
          maxLength: 30
          example: "anulado"
        mensaje:
          type: string
          example: "Registro anulado correctamente"

    NotificacionClienteResponseError400:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "DATOS_INVALIDOS"
        detalle:
          type: string
          maxLength: 250
          example: "El canal o contenido del mensaje enviado es inválido."

    NotificacionClienteResponseError404:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "CLIENTE_O_PEDIDO_NO_ENCONTRADO"
        detalle:
          type: string
          maxLength: 250
          example: "No se encontró el cliente o pedido asociado a la notificación."

    NotificacionClienteResponseError409:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "CONFLICTO"
        detalle:
          type: string
          maxLength: 250
          example: "El registro ya existe o presenta un conflicto operativo."
