openapi: 3.0.0

info:
  title: Svc_OptimizacionRutas - API de TMS
  description: |
    Servicio encargado de optimizar rutas de transporte a partir de datos de despacho, direcciones, ventanas horarias y restricciones operativas.

    ---

    **Información Técnica del Servicio:**

    * **Protocolo:** REST / HTTPS / JSON

    * **Puerto del protocolo:** 8081 (Entorno Local)

    * **Tipo de servicio:** Tarea

    * **Justificación SOA:** Autonomía, ya que encapsula una lógica compleja e independiente de optimización. Asincronismo, porque puede ejecutarse en segundo plano.

    ---
  version: 1.0.0

servers:
  - url: http://localhost:8081/api/tms
    description: Servidor Local de Desarrollo (Puerto 8081)

paths:
  /rutas/optimizaciones:
    post:
      tags:
        - TMS
      operationId: registrarOptimizacionRutas
      summary: Solicitar optimización de ruta
      description: Crea o ejecuta una nueva operación del módulo OptimizacionRutas.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OptimizacionRutasRequest'
            example:
              id_despacho: "DESP-000125"
              id_vehiculo: "VEH-000321"
              punto_origen: "ALM_LIMA"
      responses:
        '202':
          description: Proceso aceptado en segundo plano
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OptimizacionRutasResponseExito'
              example:
                ok: true
                id_ruta: "RUTA-000789"
                estado: "en_proceso"
                mensaje: "Solicitud de optimización de ruta recibida correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OptimizacionRutasResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "La lista de destinos no puede estar vacía."
        '409':
          description: Conflicto o duplicado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OptimizacionRutasResponseError409'
              example:
                ok: false
                error: "RUTA_YA_OPTIMIZADA"
                detalle: "El despacho enviado ya cuenta con una ruta optimizada."

  /r
  /rutas/optimizaciones/{id_optimizacion}:
    get:
      tags:
        - TMS
      operationId: consultarOptimizacionRutas
      summary: Consultar registro
      description: Consulta el resultado de una operación previamente registrada.
      parameters:
        - name: id_optimizacion
          in: path
          required: true
          description: Identificador del registro a consultar.
          schema:
            type: string
            maxLength: 50
            example: "OPT-000789"
      responses:
        '200':
          description: Consulta realizada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OptimizacionRutasResponseConsultaExito'
              example:
                ok: true
                id_optimizacion: "OPT-000789"
                estado: "registrado"
                mensaje: "Consulta realizada correctamente"
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OptimizacionRutasResponseError404'
              example:
                ok: false
                error: "RECURSO_NO_ENCONTRADO"
                detalle: "No se encontró el registro solicitado."

    put:
      tags:
        - TMS
      operationId: actualizarOptimizacionRutas
      summary: Actualizar registro
      description: Actualiza o corrige el estado de un registro existente.
      parameters:
        - name: id_optimizacion
          in: path
          required: true
          description: Identificador del registro a actualizar.
          schema:
            type: string
            maxLength: 50
            example: "OPT-000789"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OptimizacionRutasRequestActualizar'
      responses:
        '200':
          description: Registro actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OptimizacionRutasResponseActualizarExito'
              example:
                ok: true
                id_optimizacion: "OPT-000789"
                estado: "actualizado"
                mensaje: "Registro actualizado correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OptimizacionRutasResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "La lista de destinos no puede estar vacía."
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OptimizacionRutasResponseError404'
              example:
                ok: false
                error: "RECURSO_NO_ENCONTRADO"
                detalle: "No se encontró el registro solicitado."

components:
  schemas:
    OptimizacionRutasRequest:
      type: object
      required:
        - id_despacho
        - punto_origen
        - destinos
      properties:
        id_despacho:
          type: string
          maxLength: 50
          description: "Código único del despacho para el cual se optimizará la ruta."
          example: "DESP-000125"
        id_vehiculo:
          type: string
          maxLength: 50
          description: "Código del vehículo asignado para el transporte."
          example: "VEH-000321"
        punto_origen:
          type: string
          maxLength: 100
          description: "Punto de origen de la ruta de distribución."
          example: "ALM_LIMA"
        destinos:
          type: array
          description: "Listado de destinos que deberán considerarse en la optimización."
          items:
            type: object
            properties:
              id_destino:
                type: string
                maxLength: 50
                example: "CLI-001"
              direccion:
                type: string
                maxLength: 200
                example: "Av. Principal 123, Lima"
              ventana_horaria:
                type: string
                maxLength: 50
                example: "09:00-12:00"

    OptimizacionRutasRequestActualizar:
      type: object
      required:
        - estado
      properties:
        estado:
          type: string
          maxLength: 30
          description: "Nuevo estado del registro."
          example: "actualizado"
        observacion:
          type: string
          maxLength: 250
          description: "Comentario asociado a la actualización."
          example: "Actualización registrada correctamente."

    OptimizacionRutasResponseExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_ruta:
          type: string
          maxLength: 50
          example: "RUTA-000789"
        estado:
          type: string
          maxLength: 30
          example: "en_proceso"
        mensaje:
          type: string
          example: "Solicitud de optimización de ruta recibida correctamente"

    OptimizacionRutasResponseConsultaExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_optimizacion:
          type: string
          maxLength: 50
          example: "OPT-000789"
        estado:
          type: string
          maxLength: 30
          example: "registrado"
        mensaje:
          type: string
          example: "Consulta realizada correctamente"

    OptimizacionRutasResponseActualizarExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_optimizacion:
          type: string
          maxLength: 50
          example: "OPT-000789"
        estado:
          type: string
          maxLength: 30
          example: "actualizado"
        mensaje:
          type: string
          example: "Registro actualizado correctamente"

    OptimizacionRutasResponseError400:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "DATOS_INVALIDOS"
        detalle:
          type: string
          maxLength: 250
          example: "La lista de destinos no puede estar vacía."

    OptimizacionRutasResponseError404:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "RECURSO_NO_ENCONTRADO"
        detalle:
          type: string
          maxLength: 250
          example: "No se encontró el registro solicitado."

    OptimizacionRutasResponseError409:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "RUTA_YA_OPTIMIZADA"
        detalle:
          type: string
          maxLength: 250
          example: "El despacho enviado ya cuenta con una ruta optimizada."
