openapi: 3.0.0

info:
  title: Svc_PlanificacionOleadas - API de WMS
  description: |
    Servicio encargado de planificar oleadas de trabajo en el WMS, agrupando pedidos según criterios logísticos para optimizar el proceso de preparación y despacho.

    ---

    **Información Técnica del Servicio:**

    * **Protocolo:** REST / HTTPS / JSON

    * **Puerto del protocolo:** 8081 (Entorno Local)

    * **Tipo de servicio:** Tarea

    * **Justificación SOA:** Reusabilidad para distintos tipos de pedidos y autonomía al encapsular la lógica de agrupación.

    ---
  version: 1.0.0

servers:
  - url: http://localhost:8081/api/wms
    description: Servidor Local de Desarrollo (Puerto 8081)

paths:
  /oleadas:
    post:
      tags:
        - WMS
      operationId: registrarPlanificacionOleadas
      summary: Planificar oleada de pedidos
      description: Crea o ejecuta una nueva operación del módulo PlanificacionOleadas.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlanificacionOleadasRequest'
            example:
              id_almacen: "ALM_LIMA"
              criterio_agrupacion: "zona_despacho"
      responses:
        '201':
          description: Operación registrada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanificacionOleadasResponseExito'
              example:
                ok: true
                id_oleada: "OLE-000458"
                cantidad_pedidos: 2
                mensaje: "Oleada planificada correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanificacionOleadasResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "La lista de pedidos no puede estar vacía."
        '409':
          description: Conflicto o duplicado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanificacionOleadasResponseError409'
              example:
                ok: false
                error: "PEDIDOS_YA_AGRUPADOS"
                detalle: "Uno o más pedidos ya pertenecen a una oleada existente."

  /oleadas/{id_oleada}:
    get:
      tags:
        - WMS
      operationId: consultarPlanificacionOleadas
      summary: Consultar registro
      description: Consulta el resultado de una operación previamente registrada.
      parameters:
        - name: id_oleada
          in: path
          required: true
          description: Identificador del registro a consultar.
          schema:
            type: string
            maxLength: 50
            example: "OLE-000458"
      responses:
        '200':
          description: Consulta realizada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanificacionOleadasResponseConsultaExito'
              example:
                ok: true
                id_oleada: "OLE-000458"
                estado: "registrado"
                mensaje: "Consulta realizada correctamente"
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanificacionOleadasResponseError404'
              example:
                ok: false
                error: "RECURSO_NO_ENCONTRADO"
                detalle: "No se encontró el registro solicitado."

    put:
      tags:
        - WMS
      operationId: actualizarPlanificacionOleadas
      summary: Actualizar registro
      description: Actualiza o corrige el estado de un registro existente.
      parameters:
        - name: id_oleada
          in: path
          required: true
          description: Identificador del registro a actualizar.
          schema:
            type: string
            maxLength: 50
            example: "OLE-000458"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlanificacionOleadasRequestActualizar'
      responses:
        '200':
          description: Registro actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanificacionOleadasResponseActualizarExito'
              example:
                ok: true
                id_oleada: "OLE-000458"
                estado: "actualizado"
                mensaje: "Registro actualizado correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanificacionOleadasResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "La lista de pedidos no puede estar vacía."
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanificacionOleadasResponseError404'
              example:
                ok: false
                error: "RECURSO_NO_ENCONTRADO"
                detalle: "No se encontró el registro solicitado."

    delete:
      tags:
        - WMS
      operationId: anularPlanificacionOleadas
      summary: Anular registro
      description: Anula o cancela un registro previamente creado.
      parameters:
        - name: id_oleada
          in: path
          required: true
          description: Identificador del registro a anular.
          schema:
            type: string
            maxLength: 50
            example: "OLE-000458"
      responses:
        '200':
          description: Registro anulado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanificacionOleadasResponseAnularExito'
              example:
                ok: true
                id_oleada: "OLE-000458"
                estado: "anulado"
                mensaje: "Registro anulado correctamente"
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanificacionOleadasResponseError404'
              example:
                ok: false
                error: "RECURSO_NO_ENCONTRADO"
                detalle: "No se encontró el registro solicitado."
        '409':
          description: El registro no puede anularse
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanificacionOleadasResponseError409'
              example:
                ok: false
                error: "PEDIDOS_YA_AGRUPADOS"
                detalle: "Uno o más pedidos ya pertenecen a una oleada existente."

components:
  schemas:
    PlanificacionOleadasRequest:
      type: object
      required:
        - id_almacen
        - criterio_agrupacion
        - pedidos
      properties:
        id_almacen:
          type: string
          maxLength: 20
          description: "Código del almacén donde se realizará la planificación de oleadas."
          example: "ALM_LIMA"
        criterio_agrupacion:
          type: string
          maxLength: 50
          description: "Criterio utilizado para agrupar los pedidos."
          example: "zona_despacho"
        pedidos:
          type: array
          description: "Listado de pedidos pendientes de agrupación."
          items:
            type: object
            properties:
              id_pedido:
                type: string
                maxLength: 50
                example: "PED-000125"
              prioridad:
                type: string
                maxLength: 20
                example: "alta"
              zona_despacho:
                type: string
                maxLength: 50
                example: "ZONA_NORTE"

    PlanificacionOleadasRequestActualizar:
      type: object
      required:
        - estado
      properties:
        estado:
          type: string
          maxLength: 30
          description: "Nuevo estado del registro."
          example: "actualizado"
        observacion:
          type: string
          maxLength: 250
          description: "Comentario asociado a la actualización."
          example: "Actualización registrada correctamente."

    PlanificacionOleadasResponseExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_oleada:
          type: string
          maxLength: 50
          example: "OLE-000458"
        cantidad_pedidos:
          type: integer
          example: 2
        mensaje:
          type: string
          example: "Oleada planificada correctamente"

    PlanificacionOleadasResponseConsultaExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_oleada:
          type: string
          maxLength: 50
          example: "OLE-000458"
        estado:
          type: string
          maxLength: 30
          example: "registrado"
        mensaje:
          type: string
          example: "Consulta realizada correctamente"

    PlanificacionOleadasResponseActualizarExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_oleada:
          type: string
          maxLength: 50
          example: "OLE-000458"
        estado:
          type: string
          maxLength: 30
          example: "actualizado"
        mensaje:
          type: string
          example: "Registro actualizado correctamente"

    PlanificacionOleadasResponseAnularExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_oleada:
          type: string
          maxLength: 50
          example: "OLE-000458"
        estado:
          type: string
          maxLength: 30
          example: "anulado"
        mensaje:
          type: string
          example: "Registro anulado correctamente"

    PlanificacionOleadasResponseError400:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "DATOS_INVALIDOS"
        detalle:
          type: string
          maxLength: 250
          example: "La lista de pedidos no puede estar vacía."

    PlanificacionOleadasResponseError404:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "RECURSO_NO_ENCONTRADO"
        detalle:
          type: string
          maxLength: 250
          example: "No se encontró el registro solicitado."

    PlanificacionOleadasResponseError409:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "PEDIDOS_YA_AGRUPADOS"
        detalle:
          type: string
          maxLength: 250
          example: "Uno o más pedidos ya pertenecen a una oleada existente."
