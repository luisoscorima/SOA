openapi: 3.0.0

info:
  title: Svc_ReRuteoDinamico - API de TMS
  description: |
    Servicio encargado de generar una nueva ruta de transporte a partir de una incidencia registrada, permitiendo adaptar dinámicamente el recorrido ante cambios operativos.

    ---

    **Información Técnica del Servicio:**

    * **Protocolo:** REST / HTTPS / JSON

    * **Puerto del protocolo:** 8081 (Entorno Local)

    * **Tipo de servicio:** Tarea

    * **Justificación SOA:** Adaptabilidad, ya que permite cambios dinámicos en la ruta ante incidencias logísticas.

    ---
  version: 1.0.0

servers:
  - url: http://localhost:8081/api/tms
    description: Servidor Local de Desarrollo (Puerto 8081)

paths:
  /rutas/re-ruteos:
    post:
      tags:
        - TMS
      operationId: registrarReRuteoDinamico
      summary: Registrar re-ruteo dinámico
      description: Crea o ejecuta una nueva operación del módulo ReRuteoDinamico.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReRuteoDinamicoRequest'
            example:
              id_incidencia: "INC-000456"
              id_vehiculo: "VEH-000321"
              motivo: "bloqueo_vial"
      responses:
        '202':
          description: Proceso aceptado en segundo plano
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReRuteoDinamicoResponseExito'
              example:
                ok: true
                id_nueva_ruta: "RUTA-000790"
                id_ruta: "RUTA-000789"
                estado: "ruta_actualizada"
                mensaje: "Nueva ruta generada correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReRuteoDinamicoResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "La información de incidencia o ruta es inválida."
        '409':
          description: Conflicto o duplicado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReRuteoDinamicoResponseError409'
              example:
                ok: false
                error: "CONFLICTO"
                detalle: "El registro ya existe o presenta un conflicto operativo."

  /rutas/re-ruteos/{id_reruteo}:
    get:
      tags:
        - TMS
      operationId: consultarReRuteoDinamico
      summary: Consultar registro
      description: Consulta el resultado de una operación previamente registrada.
      parameters:
        - name: id_reruteo
          in: path
          required: true
          description: Identificador del registro a consultar.
          schema:
            type: string
            maxLength: 50
            example: "RER-000790"
      responses:
        '200':
          description: Consulta realizada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReRuteoDinamicoResponseConsultaExito'
              example:
                ok: true
                id_reruteo: "RER-000790"
                estado: "registrado"
                mensaje: "Consulta realizada correctamente"
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReRuteoDinamicoResponseError404'
              example:
                ok: false
                error: "INCIDENCIA_O_RUTA_NO_ENCONTRADA"
                detalle: "No se encontró la incidencia o ruta asociada al re-ruteo solicitado."

    put:
      tags:
        - TMS
      operationId: actualizarReRuteoDinamico
      summary: Actualizar registro
      description: Actualiza o corrige el estado de un registro existente.
      parameters:
        - name: id_reruteo
          in: path
          required: true
          description: Identificador del registro a actualizar.
          schema:
            type: string
            maxLength: 50
            example: "RER-000790"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReRuteoDinamicoRequestActualizar'
      responses:
        '200':
          description: Registro actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReRuteoDinamicoResponseActualizarExito'
              example:
                ok: true
                id_reruteo: "RER-000790"
                estado: "actualizado"
                mensaje: "Registro actualizado correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReRuteoDinamicoResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "La información de incidencia o ruta es inválida."
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReRuteoDinamicoResponseError404'
              example:
                ok: false
                error: "INCIDENCIA_O_RUTA_NO_ENCONTRADA"
                detalle: "No se encontró la incidencia o ruta asociada al re-ruteo solicitado."

components:
  schemas:
    ReRuteoDinamicoRequest:
      type: object
      required:
        - id_incidencia
        - id_vehiculo
      properties:
        id_incidencia:
          type: string
          maxLength: 50
          description: "Código único de la incidencia que origina el re-ruteo."
          example: "INC-000456"
        id_vehiculo:
          type: string
          maxLength: 50
          description: "Código del vehículo que requiere una nueva ruta."
          example: "VEH-000321"
        motivo:
          type: string
          maxLength: 100
          description: "Motivo operativo que justifica el re-ruteo."
          example: "bloqueo_vial"

    ReRuteoDinamicoRequestActualizar:
      type: object
      required:
        - estado
      properties:
        estado:
          type: string
          maxLength: 30
          description: "Nuevo estado del registro."
          example: "actualizado"
        observacion:
          type: string
          maxLength: 250
          description: "Comentario asociado a la actualización."
          example: "Actualización registrada correctamente."

    ReRuteoDinamicoResponseExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_nueva_ruta:
          type: string
          maxLength: 50
          example: "RUTA-000790"
        id_ruta:
          type: string
          maxLength: 50
          example: "RUTA-000789"
        estado:
          type: string
          maxLength: 30
          example: "ruta_actualizada"
        mensaje:
          type: string
          example: "Nueva ruta generada correctamente"

    ReRuteoDinamicoResponseConsultaExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_reruteo:
          type: string
          maxLength: 50
          example: "RER-000790"
        estado:
          type: string
          maxLength: 30
          example: "registrado"
        mensaje:
          type: string
          example: "Consulta realizada correctamente"

    ReRuteoDinamicoResponseActualizarExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_reruteo:
          type: string
          maxLength: 50
          example: "RER-000790"
        estado:
          type: string
          maxLength: 30
          example: "actualizado"
        mensaje:
          type: string
          example: "Registro actualizado correctamente"

    ReRuteoDinamicoResponseError400:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "DATOS_INVALIDOS"
        detalle:
          type: string
          maxLength: 250
          example: "La información de incidencia o ruta es inválida."

    ReRuteoDinamicoResponseError404:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "INCIDENCIA_O_RUTA_NO_ENCONTRADA"
        detalle:
          type: string
          maxLength: 250
          example: "No se encontró la incidencia o ruta asociada al re-ruteo solicitado."

    ReRuteoDinamicoResponseError409:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "CONFLICTO"
        detalle:
          type: string
          maxLength: 250
          example: "El registro ya existe o presenta un conflicto operativo."
