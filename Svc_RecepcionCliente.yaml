openapi: 3.0.0

info:
  title: Svc_RecepcionCliente - API de Cliente
  description: |
    Servicio encargado de registrar la recepción del pedido por parte del cliente, integrando la confirmación del cliente al flujo digital del sistema.

    ---

    **Información Técnica del Servicio:**

    * **Protocolo:** REST / HTTPS / JSON

    * **Puerto del protocolo:** 8081 (Entorno Local)

    * **Tipo de servicio:** Tarea

    * **Justificación SOA:** Interoperabilidad, ya que integra la confirmación del cliente al sistema logístico y comercial.

    ---
  version: 1.0.0

servers:
  - url: http://localhost:8081/api/cliente
    description: Servidor Local de Desarrollo (Puerto 8081)

paths:
  /recepciones:
    post:
      tags:
        - Cliente
      operationId: registrarRecepcionCliente
      summary: Confirmar recepción del cliente
      description: Crea o ejecuta una nueva operación del módulo RecepcionCliente.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecepcionClienteRequest'
            example:
              id_pedido: "PED-000125"
              id_cliente: 150
              id_entrega: "ENT-000125"
              estado_recepcion: "recibido"
              observacion: "Pedido recibido conforme."
      responses:
        '200':
          description: Operación ejecutada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecepcionClienteResponseExito'
              example:
                ok: true
                id_confirmacion: "CONF-000321"
                estado: "confirmado"
                mensaje: "Recepción del pedido confirmada correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecepcionClienteResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "La información de recepción enviada es inválida o incompleta."
        '409':
          description: Conflicto o duplicado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecepcionClienteResponseError409'
              example:
                ok: false
                error: "RECEPCION_YA_CONFIRMADA"
                detalle: "El pedido enviado ya cuenta con una recepción confirmada previamente."

  /r
  /recepciones/{id_recepcion}:
    get:
      tags:
        - Cliente
      operationId: consultarRecepcionCliente
      summary: Consultar registro
      description: Consulta el resultado de una operación previamente registrada.
      parameters:
        - name: id_recepcion
          in: path
          required: true
          description: Identificador del registro a consultar.
          schema:
            type: string
            maxLength: 50
            example: "REC-000321"
      responses:
        '200':
          description: Consulta realizada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecepcionClienteResponseConsultaExito'
              example:
                ok: true
                id_recepcion: "REC-000321"
                estado: "registrado"
                mensaje: "Consulta realizada correctamente"
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecepcionClienteResponseError404'
              example:
                ok: false
                error: "RECURSO_NO_ENCONTRADO"
                detalle: "No se encontró el registro solicitado."

    put:
      tags:
        - Cliente
      operationId: actualizarRecepcionCliente
      summary: Actualizar registro
      description: Actualiza o corrige el estado de un registro existente.
      parameters:
        - name: id_recepcion
          in: path
          required: true
          description: Identificador del registro a actualizar.
          schema:
            type: string
            maxLength: 50
            example: "REC-000321"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecepcionClienteRequestActualizar'
      responses:
        '200':
          description: Registro actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecepcionClienteResponseActualizarExito'
              example:
                ok: true
                id_recepcion: "REC-000321"
                estado: "actualizado"
                mensaje: "Registro actualizado correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecepcionClienteResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "La información de recepción enviada es inválida o incompleta."
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecepcionClienteResponseError404'
              example:
                ok: false
                error: "RECURSO_NO_ENCONTRADO"
                detalle: "No se encontró el registro solicitado."

components:
  schemas:
    RecepcionClienteRequest:
      type: object
      required:
        - id_pedido
        - id_cliente
        - estado_recepcion
      properties:
        id_pedido:
          type: string
          maxLength: 50
          description: "Código único del pedido recibido por el cliente."
          example: "PED-000125"
        id_cliente:
          type: integer
          description: "Identificador del cliente que confirma la recepción."
          example: 150
        id_entrega:
          type: string
          maxLength: 50
          description: "Código de la entrega asociada al pedido."
          example: "ENT-000125"
        estado_recepcion:
          type: string
          maxLength: 30
          description: "Estado de recepción declarado por el cliente."
          example: "recibido"
        observacion:
          type: string
          maxLength: 250
          description: "Comentario adicional registrado por el cliente."
          example: "Pedido recibido conforme."

    RecepcionClienteRequestActualizar:
      type: object
      required:
        - estado
      properties:
        estado:
          type: string
          maxLength: 30
          description: "Nuevo estado del registro."
          example: "actualizado"
        observacion:
          type: string
          maxLength: 250
          description: "Comentario asociado a la actualización."
          example: "Actualización registrada correctamente."

    RecepcionClienteResponseExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_confirmacion:
          type: string
          maxLength: 50
          example: "CONF-000321"
        estado:
          type: string
          maxLength: 30
          example: "confirmado"
        mensaje:
          type: string
          example: "Recepción del pedido confirmada correctamente"

    RecepcionClienteResponseConsultaExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_recepcion:
          type: string
          maxLength: 50
          example: "REC-000321"
        estado:
          type: string
          maxLength: 30
          example: "registrado"
        mensaje:
          type: string
          example: "Consulta realizada correctamente"

    RecepcionClienteResponseActualizarExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_recepcion:
          type: string
          maxLength: 50
          example: "REC-000321"
        estado:
          type: string
          maxLength: 30
          example: "actualizado"
        mensaje:
          type: string
          example: "Registro actualizado correctamente"

    RecepcionClienteResponseError400:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "DATOS_INVALIDOS"
        detalle:
          type: string
          maxLength: 250
          example: "La información de recepción enviada es inválida o incompleta."

    RecepcionClienteResponseError404:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "RECURSO_NO_ENCONTRADO"
        detalle:
          type: string
          maxLength: 250
          example: "No se encontró el registro solicitado."

    RecepcionClienteResponseError409:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "RECEPCION_YA_CONFIRMADA"
        detalle:
          type: string
          maxLength: 250
          example: "El pedido enviado ya cuenta con una recepción confirmada previamente."
