openapi: 3.0.0

info:
  title: Svc_RegistroIncidencias - API de TMS
  description: |
    Servicio encargado de registrar incidencias ocurridas durante el transporte, permitiendo documentar eventos operativos sin interrumpir el flujo principal del despacho.

    ---

    **Información Técnica del Servicio:**

    * **Protocolo:** REST / HTTPS / JSON

    * **Puerto del protocolo:** 8081 (Entorno Local)

    * **Tipo de servicio:** Tarea

    * **Justificación SOA:** Encapsulación, ya que maneja eventos e incidencias sin afectar el flujo principal del transporte.

    ---
  version: 1.0.0

servers:
  - url: http://localhost:8081/api/tms
    description: Servidor Local de Desarrollo (Puerto 8081)

paths:
  /incidencias:
    post:
      tags:
        - TMS
      operationId: registrarRegistroIncidencias
      summary: Registrar incidencia
      description: Crea o ejecuta una nueva operación del módulo RegistroIncidencias.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegistroIncidenciasRequest'
            example:
              id_ruta: "RUTA-000789"
              id_vehiculo: "VEH-000321"
              tipo_evento: "retraso"
              descripcion: "Retraso por congestión vehicular en ruta."
              severidad: "media"
      responses:
        '201':
          description: Registro creado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistroIncidenciasResponseExito'
              example:
                ok: true
                id_incidencia: "INC-000456"
                estado: "registrada"
                mensaje: "Incidencia registrada correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistroIncidenciasResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "La descripción de la incidencia no puede estar vacía."
        '409':
          description: Conflicto o duplicado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistroIncidenciasResponseError409'
              example:
                ok: false
                error: "CONFLICTO"
                detalle: "El registro ya existe o presenta un conflicto operativo."

  /incidencias/{id_incidencia}:
    get:
      tags:
        - TMS
      operationId: consultarRegistroIncidencias
      summary: Consultar registro
      description: Consulta el resultado de una operación previamente registrada.
      parameters:
        - name: id_incidencia
          in: path
          required: true
          description: Identificador del registro a consultar.
          schema:
            type: string
            maxLength: 50
            example: "INC-000456"
      responses:
        '200':
          description: Consulta realizada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistroIncidenciasResponseConsultaExito'
              example:
                ok: true
                id_incidencia: "INC-000456"
                estado: "registrado"
                mensaje: "Consulta realizada correctamente"
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistroIncidenciasResponseError404'
              example:
                ok: false
                error: "RUTA_O_VEHICULO_NO_ENCONTRADO"
                detalle: "No se encontró la ruta o el vehículo asociado a la incidencia."

    put:
      tags:
        - TMS
      operationId: actualizarRegistroIncidencias
      summary: Actualizar registro
      description: "Actualiza o corrige el estado de un registro existente. Para anular, envíe estado anulado."
      parameters:
        - name: id_incidencia
          in: path
          required: true
          description: Identificador del registro a actualizar.
          schema:
            type: string
            maxLength: 50
            example: "INC-000456"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegistroIncidenciasRequestActualizar'
      responses:
        '200':
          description: Registro actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistroIncidenciasResponseActualizarExito'
              example:
                ok: true
                id_incidencia: "INC-000456"
                estado: "actualizado"
                mensaje: "Registro actualizado correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistroIncidenciasResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "La descripción de la incidencia no puede estar vacía."
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistroIncidenciasResponseError404'
              example:
                ok: false
                error: "RUTA_O_VEHICULO_NO_ENCONTRADO"
                detalle: "No se encontró la ruta o el vehículo asociado a la incidencia."

components:
  schemas:
    RegistroIncidenciasRequest:
      type: object
      required:
        - id_ruta
        - id_vehiculo
        - tipo_evento
        - descripcion
      properties:
        id_ruta:
          type: string
          maxLength: 50
          description: "Código de la ruta donde ocurrió la incidencia."
          example: "RUTA-000789"
        id_vehiculo:
          type: string
          maxLength: 50
          description: "Código del vehículo asociado a la incidencia."
          example: "VEH-000321"
        tipo_evento:
          type: string
          maxLength: 50
          description: "Tipo de evento registrado durante el transporte."
          example: "retraso"
        descripcion:
          type: string
          maxLength: 250
          description: "Descripción breve de la incidencia."
          example: "Retraso por congestión vehicular en ruta."
        severidad:
          type: string
          maxLength: 20
          description: "Nivel de severidad de la incidencia."
          example: "media"

    RegistroIncidenciasRequestActualizar:
      type: object
      required:
        - estado
      properties:
        estado:
          type: string
          maxLength: 30
          description: "Nuevo estado del registro. Use \"anulado\" para cancelar sin eliminar."
          example: "actualizado"
        observacion:
          type: string
          maxLength: 250
          description: "Comentario asociado a la actualización."
          example: "Actualización registrada correctamente."

    RegistroIncidenciasResponseExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_incidencia:
          type: string
          maxLength: 50
          example: "INC-000456"
        estado:
          type: string
          maxLength: 30
          example: "registrada"
        mensaje:
          type: string
          example: "Incidencia registrada correctamente"

    RegistroIncidenciasResponseConsultaExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_incidencia:
          type: string
          maxLength: 50
          example: "INC-000456"
        estado:
          type: string
          maxLength: 30
          example: "registrado"
        mensaje:
          type: string
          example: "Consulta realizada correctamente"

    RegistroIncidenciasResponseActualizarExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_incidencia:
          type: string
          maxLength: 50
          example: "INC-000456"
        estado:
          type: string
          maxLength: 30
          example: "actualizado"
        mensaje:
          type: string
          example: "Registro actualizado correctamente"

    RegistroIncidenciasResponseError400:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "DATOS_INVALIDOS"
        detalle:
          type: string
          maxLength: 250
          example: "La descripción de la incidencia no puede estar vacía."

    RegistroIncidenciasResponseError404:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "RUTA_O_VEHICULO_NO_ENCONTRADO"
        detalle:
          type: string
          maxLength: 250
          example: "No se encontró la ruta o el vehículo asociado a la incidencia."

    RegistroIncidenciasResponseError409:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "CONFLICTO"
        detalle:
          type: string
          maxLength: 250
          example: "El registro ya existe o presenta un conflicto operativo."
