openapi: 3.0.0

info:
  title: Svc_ValidacionFactura - API de Repartidor
  description: |
    Servicio encargado de validar los productos entregados contra la factura asociada, garantizando la integridad y consistencia de la información comercial y logística.

    ---

    **Información Técnica del Servicio:**

    * **Protocolo:** REST / HTTPS / JSON

    * **Puerto del protocolo:** 8081 (Entorno Local)

    * **Tipo de servicio:** Tarea

    * **Justificación SOA:** Consistencia, ya que garantiza la integridad de los datos entre la entrega física y la facturación.

    ---
  version: 1.0.0

servers:
  - url: http://localhost:8081/api/repartidor
    description: Servidor Local de Desarrollo (Puerto 8081)

paths:
  /facturas/validaciones:
    post:
      tags:
        - Repartidor
      operationId: registrarValidacionFactura
      summary: Ejecutar validación de factura
      description: Crea o ejecuta una nueva operación del módulo ValidacionFactura.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidacionFacturaRequest'
            example:
              id_factura: "FAC-000125"
              id_entrega: "ENT-000125"
      responses:
        '200':
          description: Operación ejecutada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidacionFacturaResponseExito'
              example:
                ok: true
                validacion_correcta: true
                estado: "validado"
                mensaje: "Los productos entregados coinciden con la factura"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidacionFacturaResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "La información de productos entregados es inválida o incompleta."
        '409':
          description: Conflicto o duplicado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidacionFacturaResponseError409'
              example:
                ok: false
                error: "INCONSISTENCIA_FACTURA"
                detalle: "Existen diferencias entre los productos entregados y los registrados en la factura."

  /facturas/validaciones/{id_validacion}:
    get:
      tags:
        - Repartidor
      operationId: consultarValidacionFactura
      summary: Consultar registro
      description: Consulta el resultado de una operación previamente registrada.
      parameters:
        - name: id_validacion
          in: path
          required: true
          description: Identificador del registro a consultar.
          schema:
            type: string
            maxLength: 50
            example: "VFAC-000321"
      responses:
        '200':
          description: Consulta realizada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidacionFacturaResponseConsultaExito'
              example:
                ok: true
                id_validacion: "VFAC-000321"
                estado: "registrado"
                mensaje: "Consulta realizada correctamente"
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidacionFacturaResponseError404'
              example:
                ok: false
                error: "RECURSO_NO_ENCONTRADO"
                detalle: "No se encontró el registro solicitado."

    put:
      tags:
        - Repartidor
      operationId: actualizarValidacionFactura
      summary: Actualizar registro
      description: Actualiza o corrige el estado de un registro existente.
      parameters:
        - name: id_validacion
          in: path
          required: true
          description: Identificador del registro a actualizar.
          schema:
            type: string
            maxLength: 50
            example: "VFAC-000321"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidacionFacturaRequestActualizar'
      responses:
        '200':
          description: Registro actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidacionFacturaResponseActualizarExito'
              example:
                ok: true
                id_validacion: "VFAC-000321"
                estado: "actualizado"
                mensaje: "Registro actualizado correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidacionFacturaResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "La información de productos entregados es inválida o incompleta."
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidacionFacturaResponseError404'
              example:
                ok: false
                error: "RECURSO_NO_ENCONTRADO"
                detalle: "No se encontró el registro solicitado."

components:
  schemas:
    ValidacionFacturaRequest:
      type: object
      required:
        - id_factura
        - id_entrega
        - productos
      properties:
        id_factura:
          type: string
          maxLength: 50
          description: "Código único de la factura asociada a la entrega."
          example: "FAC-000125"
        id_entrega:
          type: string
          maxLength: 50
          description: "Código único de la entrega realizada."
          example: "ENT-000125"
        productos:
          type: array
          description: "Listado de productos entregados que serán comparados contra la factura."
          items:
            type: object
            properties:
              id_producto:
                type: string
                maxLength: 50
                example: "SKU_IK_1.5L"
              cantidad_entregada:
                type: integer
                minimum: 1
                example: 120

    ValidacionFacturaRequestActualizar:
      type: object
      required:
        - estado
      properties:
        estado:
          type: string
          maxLength: 30
          description: "Nuevo estado del registro."
          example: "actualizado"
        observacion:
          type: string
          maxLength: 250
          description: "Comentario asociado a la actualización."
          example: "Actualización registrada correctamente."

    ValidacionFacturaResponseExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        validacion_correcta:
          type: boolean
          example: true
        estado:
          type: string
          maxLength: 30
          example: "validado"
        mensaje:
          type: string
          example: "Los productos entregados coinciden con la factura"

    ValidacionFacturaResponseConsultaExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_validacion:
          type: string
          maxLength: 50
          example: "VFAC-000321"
        estado:
          type: string
          maxLength: 30
          example: "registrado"
        mensaje:
          type: string
          example: "Consulta realizada correctamente"

    ValidacionFacturaResponseActualizarExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_validacion:
          type: string
          maxLength: 50
          example: "VFAC-000321"
        estado:
          type: string
          maxLength: 30
          example: "actualizado"
        mensaje:
          type: string
          example: "Registro actualizado correctamente"

    ValidacionFacturaResponseError400:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "DATOS_INVALIDOS"
        detalle:
          type: string
          maxLength: 250
          example: "La información de productos entregados es inválida o incompleta."

    ValidacionFacturaResponseError404:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "RECURSO_NO_ENCONTRADO"
        detalle:
          type: string
          maxLength: 250
          example: "No se encontró el registro solicitado."

    ValidacionFacturaResponseError409:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "INCONSISTENCIA_FACTURA"
        detalle:
          type: string
          maxLength: 250
          example: "Existen diferencias entre los productos entregados y los registrados en la factura."
