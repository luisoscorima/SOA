openapi: 3.0.0

info:
  title: Svc_ValidacionTransportista - API de Logística
  description: |
    Servicio encargado de validar los datos del transportista antes de autorizar su participación en el proceso de despacho, centralizando las verificaciones legales y operativas.

    ---

    **Información Técnica del Servicio:**

    * **Protocolo:** REST / HTTPS / JSON

    * **Puerto del protocolo:** 8081 (Entorno Local)

    * **Tipo de servicio:** Tarea

    * **Justificación SOA:** Encapsulación, ya que centraliza validaciones legales y operativas del transportista.

    ---
  version: 1.0.0

servers:
  - url: http://localhost:8081/api/logistica
    description: Servidor Local de Desarrollo (Puerto 8081)

paths:
  /transportistas/validaciones:
    post:
      tags:
        - Logística
      operationId: registrarValidacionTransportista
      summary: Ejecutar validación de transportista
      description: Crea o ejecuta una nueva operación del módulo ValidacionTransportista.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidacionTransportistaRequest'
            example:
              id_transportista: "TR-000125"
              ruc: "20548796321"
              licencia_conducir: "Q12345678"
              placa_vehiculo: "ABC-123"
      responses:
        '201':
          description: Operación registrada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidacionTransportistaResponseExito'
              example:
                ok: true
                validado: true
                estado: "aprobado"
                mensaje: "Transportista validado correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidacionTransportistaResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "El RUC o la placa del vehículo no cumplen con el formato requerido."
        '409':
          description: Conflicto o duplicado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidacionTransportistaResponseError409'
              example:
                ok: false
                error: "TRANSPORTISTA_NO_VALIDO"
                detalle: "El transportista no cumple con los requisitos legales u operativos para el despacho."

  /transportistas/validaciones/{id_validacion}:
    get:
      tags:
        - Logística
      operationId: consultarValidacionTransportista
      summary: Consultar registro
      description: Consulta el resultado de una operación previamente registrada.
      parameters:
        - name: id_validacion
          in: path
          required: true
          description: Identificador del registro a consultar.
          schema:
            type: string
            maxLength: 50
            example: "VTR-000321"
      responses:
        '200':
          description: Consulta realizada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidacionTransportistaResponseConsultaExito'
              example:
                ok: true
                id_validacion: "VTR-000321"
                estado: "registrado"
                mensaje: "Consulta realizada correctamente"
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidacionTransportistaResponseError404'
              example:
                ok: false
                error: "RECURSO_NO_ENCONTRADO"
                detalle: "No se encontró el registro solicitado."

    put:
      tags:
        - Logística
      operationId: actualizarValidacionTransportista
      summary: Actualizar registro
      description: Actualiza o corrige el estado de un registro existente.
      parameters:
        - name: id_validacion
          in: path
          required: true
          description: Identificador del registro a actualizar.
          schema:
            type: string
            maxLength: 50
            example: "VTR-000321"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidacionTransportistaRequestActualizar'
      responses:
        '200':
          description: Registro actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidacionTransportistaResponseActualizarExito'
              example:
                ok: true
                id_validacion: "VTR-000321"
                estado: "actualizado"
                mensaje: "Registro actualizado correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidacionTransportistaResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "El RUC o la placa del vehículo no cumplen con el formato requerido."
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidacionTransportistaResponseError404'
              example:
                ok: false
                error: "RECURSO_NO_ENCONTRADO"
                detalle: "No se encontró el registro solicitado."

components:
  schemas:
    ValidacionTransportistaRequest:
      type: object
      required:
        - id_transportista
        - ruc
        - licencia_conducir
        - placa_vehiculo
      properties:
        id_transportista:
          type: string
          maxLength: 50
          description: "Código único del transportista registrado."
          example: "TR-000125"
        ruc:
          type: string
          minLength: 11
          maxLength: 11
          description: "Número de RUC del transportista o empresa de transporte."
          example: "20548796321"
        licencia_conducir:
          type: string
          maxLength: 20
          description: "Número de licencia de conducir del responsable del traslado."
          example: "Q12345678"
        placa_vehiculo:
          type: string
          maxLength: 10
          description: "Placa del vehículo asignado para el despacho."
          example: "ABC-123"

    ValidacionTransportistaRequestActualizar:
      type: object
      required:
        - estado
      properties:
        estado:
          type: string
          maxLength: 30
          description: "Nuevo estado del registro."
          example: "actualizado"
        observacion:
          type: string
          maxLength: 250
          description: "Comentario asociado a la actualización."
          example: "Actualización registrada correctamente."

    ValidacionTransportistaResponseExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        validado:
          type: boolean
          example: true
        estado:
          type: string
          maxLength: 30
          example: "aprobado"
        mensaje:
          type: string
          example: "Transportista validado correctamente"

    ValidacionTransportistaResponseConsultaExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_validacion:
          type: string
          maxLength: 50
          example: "VTR-000321"
        estado:
          type: string
          maxLength: 30
          example: "registrado"
        mensaje:
          type: string
          example: "Consulta realizada correctamente"

    ValidacionTransportistaResponseActualizarExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_validacion:
          type: string
          maxLength: 50
          example: "VTR-000321"
        estado:
          type: string
          maxLength: 30
          example: "actualizado"
        mensaje:
          type: string
          example: "Registro actualizado correctamente"

    ValidacionTransportistaResponseError400:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "DATOS_INVALIDOS"
        detalle:
          type: string
          maxLength: 250
          example: "El RUC o la placa del vehículo no cumplen con el formato requerido."

    ValidacionTransportistaResponseError404:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "RECURSO_NO_ENCONTRADO"
        detalle:
          type: string
          maxLength: 250
          example: "No se encontró el registro solicitado."

    ValidacionTransportistaResponseError409:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "TRANSPORTISTA_NO_VALIDO"
        detalle:
          type: string
          maxLength: 250
          example: "El transportista no cumple con los requisitos legales u operativos para el despacho."
