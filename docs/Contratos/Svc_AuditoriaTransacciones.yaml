openapi: 3.0.0

info:
  title: Svc_AuditoriaTransacciones - API de Seguridad
  description: |
    Servicio encargado de registrar eventos críticos del sistema para fines de auditoría, trazabilidad y seguimiento de operaciones.

    ---

    **Información Técnica del Servicio:**

    * **Protocolo:** REST / HTTPS / JSON

    * **Puerto del protocolo:** 8081 (Entorno Local)

    * **Tipo de servicio:** Utilidad

    * **Justificación SOA:** Permite trazabilidad y seguimiento de operaciones críticas del sistema mediante registros centralizados de auditoría.

    ---
  version: 1.0.0

servers:
  - url: http://localhost:8081/api/seguridad
    description: Servidor Local de Desarrollo (Puerto 8081)

paths:
  /auditoria/transacciones:
    post:
      tags:
        - Seguridad
      operationId: registrarAuditoriaTransacciones
      summary: Registrar auditoría de transacción
      description: Crea o ejecuta una nueva operación del módulo AuditoriaTransacciones.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuditoriaTransaccionesRequest'
            example:
              id_evento: "EVT-000125"
              usuario: "admin_logistica"
              modulo: "despachos"
              accion: "actualizacion_stock"
              fecha_evento: "2026-05-29T16:30:00"
              detalle: "Actualización automática de stock ejecutada correctamente."
      responses:
        '201':
          description: Registro creado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditoriaTransaccionesResponseExito'
              example:
                ok: true
                id_auditoria: "AUD-000321"
                estado: "registrado"
                mensaje: "Evento de auditoría registrado correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditoriaTransaccionesResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "La información del evento de auditoría es inválida o incompleta."
        '409':
          description: Conflicto o duplicado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditoriaTransaccionesResponseError409'
              example:
                ok: false
                error: "EVENTO_YA_REGISTRADO"
                detalle: "El evento enviado ya fue registrado previamente en auditoría."

  /auditoria/transacciones/{id_auditoria}:
    get:
      tags:
        - Seguridad
      operationId: consultarAuditoriaTransacciones
      summary: Consultar registro
      description: Consulta el resultado de una operación previamente registrada.
      parameters:
        - name: id_auditoria
          in: path
          required: true
          description: Identificador del registro a consultar.
          schema:
            type: string
            maxLength: 50
            example: "AUD-000321"
      responses:
        '200':
          description: Consulta realizada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditoriaTransaccionesResponseConsultaExito'
              example:
                ok: true
                id_auditoria: "AUD-000321"
                estado: "registrado"
                mensaje: "Consulta realizada correctamente"
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditoriaTransaccionesResponseError404'
              example:
                ok: false
                error: "RECURSO_NO_ENCONTRADO"
                detalle: "No se encontró el registro solicitado."

    put:
      tags:
        - Seguridad
      operationId: actualizarAuditoriaTransacciones
      summary: Actualizar registro
      description: "Actualiza o corrige el estado de un registro existente. Para anular, envíe estado anulado."
      parameters:
        - name: id_auditoria
          in: path
          required: true
          description: Identificador del registro a actualizar.
          schema:
            type: string
            maxLength: 50
            example: "AUD-000321"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuditoriaTransaccionesRequestActualizar'
      responses:
        '200':
          description: Registro actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditoriaTransaccionesResponseActualizarExito'
              example:
                ok: true
                id_auditoria: "AUD-000321"
                estado: "actualizado"
                mensaje: "Registro actualizado correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditoriaTransaccionesResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "La información del evento de auditoría es inválida o incompleta."
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditoriaTransaccionesResponseError404'
              example:
                ok: false
                error: "RECURSO_NO_ENCONTRADO"
                detalle: "No se encontró el registro solicitado."

security:
  - bearerAuth: []

components:
  schemas:
    AuditoriaTransaccionesRequest:
      type: object
      required:
        - id_evento
        - usuario
        - accion
        - fecha_evento
      properties:
        id_evento:
          type: string
          maxLength: 50
          description: "Código único del evento auditado."
          example: "EVT-000125"
        usuario:
          type: string
          maxLength: 100
          description: "Usuario responsable de la operación registrada."
          example: "admin_logistica"
        modulo:
          type: string
          maxLength: 50
          description: "Módulo del sistema donde ocurrió la transacción."
          example: "despachos"
        accion:
          type: string
          maxLength: 100
          description: "Acción crítica ejecutada dentro del sistema."
          example: "actualizacion_stock"
        fecha_evento:
          type: string
          format: date-time
          description: "Fecha y hora del evento auditado."
          example: "2026-05-29T16:30:00"
        detalle:
          type: string
          maxLength: 250
          description: "Descripción detallada del evento registrado."
          example: "Actualización automática de stock ejecutada correctamente."

    AuditoriaTransaccionesRequestActualizar:
      type: object
      required:
        - estado
      properties:
        estado:
          type: string
          maxLength: 30
          description: "Nuevo estado del registro. Use \"anulado\" para cancelar sin eliminar."
          example: "actualizado"
        observacion:
          type: string
          maxLength: 250
          description: "Comentario asociado a la actualización."
          example: "Actualización registrada correctamente."

    AuditoriaTransaccionesResponseExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_auditoria:
          type: string
          maxLength: 50
          example: "AUD-000321"
        estado:
          type: string
          maxLength: 30
          example: "registrado"
        mensaje:
          type: string
          example: "Evento de auditoría registrado correctamente"

    AuditoriaTransaccionesResponseConsultaExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_auditoria:
          type: string
          maxLength: 50
          example: "AUD-000321"
        estado:
          type: string
          maxLength: 30
          example: "registrado"
        mensaje:
          type: string
          example: "Consulta realizada correctamente"

    AuditoriaTransaccionesResponseActualizarExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_auditoria:
          type: string
          maxLength: 50
          example: "AUD-000321"
        estado:
          type: string
          maxLength: 30
          example: "actualizado"
        mensaje:
          type: string
          example: "Registro actualizado correctamente"

    AuditoriaTransaccionesResponseError400:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "DATOS_INVALIDOS"
        detalle:
          type: string
          maxLength: 250
          example: "La información del evento de auditoría es inválida o incompleta."

    AuditoriaTransaccionesResponseError404:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "RECURSO_NO_ENCONTRADO"
        detalle:
          type: string
          maxLength: 250
          example: "No se encontró el registro solicitado."

    AuditoriaTransaccionesResponseError409:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "EVENTO_YA_REGISTRADO"
        detalle:
          type: string
          maxLength: 250
          example: "El evento enviado ya fue registrado previamente en auditoría."
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

