openapi: 3.0.0

info:
  title: Svc_GestionMantenimientoVehicular - API de Flota
  description: |
    Servicio encargado de gestionar el mantenimiento vehicular, centralizando la disponibilidad y el estado operativo de la flota.

    ---

    **Información Técnica del Servicio:**

    * **Protocolo:** REST / HTTPS / JSON

    * **Puerto del protocolo:** 8081 (Entorno Local)

    * **Tipo de servicio:** Entidad

    * **Justificación SOA:** Centraliza la disponibilidad y el estado operativo de la flota vehicular.

    ---
  version: 1.0.0

servers:
  - url: http://localhost:8081/api/flota
    description: Servidor Local de Desarrollo (Puerto 8081)

paths:
  /vehiculos/mantenimientos:
    post:
      tags:
        - Flota
      operationId: registrarGestionMantenimientoVehicular
      summary: Registrar mantenimiento vehicular
      description: Crea o ejecuta una nueva operación del módulo GestionMantenimientoVehicular.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GestionMantenimientoVehicularRequest'
            example:
              placa_vehiculo: "ABC-123"
              estado_mantenimiento: "operativo"
              fecha_revision: "2026-05-29"
              observacion: "Vehículo disponible para ruta."
      responses:
        '201':
          description: Registro creado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GestionMantenimientoVehicularResponseExito'
              example:
                ok: true
                id_registro_mantenimiento: "MANT-000321"
                id_vehiculo: "VEH-000321"
                estado_mantenimiento: "operativo"
                mensaje: "Estado de mantenimiento vehicular actualizado correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GestionMantenimientoVehicularResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "La información de mantenimiento enviada es inválida o incompleta."
        '409':
          description: Conflicto o duplicado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GestionMantenimientoVehicularResponseError409'
              example:
                ok: false
                error: "CONFLICTO"
                detalle: "El registro ya existe o presenta un conflicto operativo."

  /vehiculos/mantenimientos/{id_mantenimiento}:
    get:
      tags:
        - Flota
      operationId: consultarGestionMantenimientoVehicular
      summary: Consultar registro
      description: Consulta el resultado de una operación previamente registrada.
      parameters:
        - name: id_mantenimiento
          in: path
          required: true
          description: Identificador del registro a consultar.
          schema:
            type: string
            maxLength: 50
            example: "MANT-000321"
      responses:
        '200':
          description: Consulta realizada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GestionMantenimientoVehicularResponseConsultaExito'
              example:
                ok: true
                id_mantenimiento: "MANT-000321"
                estado: "registrado"
                mensaje: "Consulta realizada correctamente"
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GestionMantenimientoVehicularResponseError404'
              example:
                ok: false
                error: "VEHICULO_NO_ENCONTRADO"
                detalle: "No existe un vehículo registrado con el identificador enviado."

    put:
      tags:
        - Flota
      operationId: actualizarGestionMantenimientoVehicular
      summary: Actualizar registro
      description: Actualiza o corrige el estado de un registro existente.
      parameters:
        - name: id_mantenimiento
          in: path
          required: true
          description: Identificador del registro a actualizar.
          schema:
            type: string
            maxLength: 50
            example: "MANT-000321"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GestionMantenimientoVehicularRequestActualizar'
      responses:
        '200':
          description: Registro actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GestionMantenimientoVehicularResponseActualizarExito'
              example:
                ok: true
                id_mantenimiento: "MANT-000321"
                estado: "actualizado"
                mensaje: "Registro actualizado correctamente"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GestionMantenimientoVehicularResponseError400'
              example:
                ok: false
                error: "DATOS_INVALIDOS"
                detalle: "La información de mantenimiento enviada es inválida o incompleta."
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GestionMantenimientoVehicularResponseError404'
              example:
                ok: false
                error: "VEHICULO_NO_ENCONTRADO"
                detalle: "No existe un vehículo registrado con el identificador enviado."

security:
  - bearerAuth: []

components:
  schemas:
    GestionMantenimientoVehicularRequest:
      type: object
      required:
        - estado_mantenimiento
        - fecha_revision
      properties:
        placa_vehiculo:
          type: string
          maxLength: 10
          description: "Placa del vehículo asociado al mantenimiento."
          example: "ABC-123"
        estado_mantenimiento:
          type: string
          maxLength: 30
          description: "Estado operativo o de mantenimiento del vehículo."
          example: "operativo"
        fecha_revision:
          type: string
          format: date
          description: "Fecha de revisión del estado de mantenimiento."
          example: "2026-05-29"
        observacion:
          type: string
          maxLength: 250
          description: "Comentario adicional sobre el estado del vehículo."
          example: "Vehículo disponible para ruta."

    GestionMantenimientoVehicularRequestActualizar:
      type: object
      required:
        - estado
      properties:
        estado:
          type: string
          maxLength: 30
          description: "Nuevo estado del registro."
          example: "actualizado"
        observacion:
          type: string
          maxLength: 250
          description: "Comentario asociado a la actualización."
          example: "Actualización registrada correctamente."

    GestionMantenimientoVehicularResponseExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_registro_mantenimiento:
          type: string
          maxLength: 50
          example: "MANT-000321"
        id_vehiculo:
          type: string
          maxLength: 50
          example: "VEH-000321"
        estado_mantenimiento:
          type: string
          maxLength: 30
          example: "operativo"
        mensaje:
          type: string
          example: "Estado de mantenimiento vehicular actualizado correctamente"

    GestionMantenimientoVehicularResponseConsultaExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_mantenimiento:
          type: string
          maxLength: 50
          example: "MANT-000321"
        estado:
          type: string
          maxLength: 30
          example: "registrado"
        mensaje:
          type: string
          example: "Consulta realizada correctamente"

    GestionMantenimientoVehicularResponseActualizarExito:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        id_mantenimiento:
          type: string
          maxLength: 50
          example: "MANT-000321"
        estado:
          type: string
          maxLength: 30
          example: "actualizado"
        mensaje:
          type: string
          example: "Registro actualizado correctamente"

    GestionMantenimientoVehicularResponseError400:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "DATOS_INVALIDOS"
        detalle:
          type: string
          maxLength: 250
          example: "La información de mantenimiento enviada es inválida o incompleta."

    GestionMantenimientoVehicularResponseError404:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "VEHICULO_NO_ENCONTRADO"
        detalle:
          type: string
          maxLength: 250
          example: "No existe un vehículo registrado con el identificador enviado."

    GestionMantenimientoVehicularResponseError409:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          maxLength: 100
          example: "CONFLICTO"
        detalle:
          type: string
          maxLength: 250
          example: "El registro ya existe o presenta un conflicto operativo."
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

